<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMG Intelligent Operations Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: Arial, sans-serif;
      background: #EDEBE7;
      color: #002F32;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #D8E8E6; }
    ::-webkit-scrollbar-thumb { background: #008F83; border-radius: 3px; }

    /* ═══ APP SHELL ═══════════════════════════════════════════════════════ */
    .app-shell {
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ═══ HEADER ══════════════════════════════════════════════════════════ */
    .header {
      background: #035C67;
      padding: 0 16px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; min-height: 48px;
      border-bottom: 2px solid #008F83;
    }
    .header-logo {
      font-size: 13px; font-weight: 700; color: #fff;
      letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0;
    }
    .header-logo span { color: #3EFFC0; }

    /* Module nav tabs */
    .module-tabs { display: flex; gap: 2px; flex: 1; }
    .module-tab {
      padding: 0 16px; height: 48px; border: none;
      background: transparent; color: rgba(255,255,255,0.65);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .module-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .module-tab.active { color: #fff; border-bottom-color: #3EFFC0; }

    /* TRC selector */
    .trc-selector { display: flex; gap: 4px; flex-shrink: 0; }
    .trc-btn {
      padding: 4px 10px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent; color: rgba(255,255,255,0.7);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .trc-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .trc-btn.active { background: #008F83; border-color: #008F83; color: #fff; }

    /* ═══ OPERATIONS TAB ══════════════════════════════════════════════════ */
    .ops-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Bot sub-tabs (inside Operations) */
    .ops-bot-tabs {
      display: flex; gap: 0; background: #fff;
      border-bottom: 2px solid #D8E8E6;
      flex-shrink: 0; padding: 0 8px;
    }
    .ops-bot-tab {
      padding: 0 14px; height: 40px; border: none;
      background: transparent; color: #5A8A86;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .ops-bot-tab:hover { color: #035C67; background: #F0FAF8; }
    .ops-bot-tab.active { color: #035C67; border-bottom-color: #035C67; }
    .ops-bot-tab .ver { font-size: 10px; opacity: 0.6; font-weight: 400; }

    /* Main layout (data panel + analysis panel) */
    .main-content { display: flex; flex: 1; overflow: hidden; }

    /* Data Panel */
    .data-panel {
      width: 340px; flex-shrink: 0; background: #fff;
      border-right: 1px solid #D8E8E6;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      background: #E0F2F0; padding: 8px 12px;
      border-bottom: 1px solid #C8E0DC;
      font-size: 11px; font-weight: 700; color: #035C67;
      letter-spacing: 0.5px; flex-shrink: 0;
    }
    .data-load-block {
      padding: 8px 12px; background: #F8FFFE;
      border-bottom: 1px solid #C8E0DC;
      font-size: 10.5px; font-family: 'Courier New', monospace;
      color: #002F32; flex-shrink: 0;
    }
    .data-load-block .dl-header { font-weight: 700; color: #035C67; margin-bottom: 4px; }
    .data-load-block .dl-row { margin: 1px 0; }
    .grid-scroll { flex: 1; overflow-y: auto; }

    /* Staffing table */
    .staffing-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .staffing-table thead th {
      background: #035C67; color: #fff;
      padding: 5px 6px; font-size: 10px; font-weight: 700;
      position: sticky; top: 0; z-index: 1;
      text-align: center; white-space: nowrap;
    }
    .staffing-table tbody td {
      padding: 3px 6px; text-align: center;
      border-bottom: 1px solid #EEE;
      font-family: 'Courier New', monospace; font-size: 10.5px;
    }
    .staffing-table tbody tr:hover { background: rgba(3,92,103,0.05); }
    .staffing-table .time-col { font-weight: 700; color: #035C67; text-align: left; }
    .staffing-table .net-col { font-weight: 700; }

    /* Status colors (brand-accurate) */
    .status-critical  { background: rgba(234,83,83,0.18); color: #B71C1C; }
    .status-at_risk   { background: rgba(232,135,137,0.22); color: #8B0000; }
    .status-threshold { background: #FFFDE7; color: #6D4C41; }
    .status-adequate  { background: rgba(218,250,135,0.35); color: #1B5E20; }
    .status-surplus   { background: rgba(144,185,255,0.28); color: #0D47A1; }
    .status-forecast  { color: #888; font-style: italic; }

    .legend { display: flex; gap: 6px; padding: 6px 12px; flex-wrap: wrap; flex-shrink: 0; border-top: 1px solid #D8E8E6; }
    .legend-item { display: flex; align-items: center; gap: 3px; font-size: 9.5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* Analysis Panel */
    .analysis-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #FAFAF8;
    }
    .analysis-header {
      padding: 8px 14px; background: #E0F2F0;
      border-bottom: 1px solid #C8E0DC;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .analysis-header-left { font-size: 11px; font-weight: 700; color: #035C67; letter-spacing: 0.5px; }
    .analysis-header-right { display: flex; gap: 8px; }
    .action-btn {
      padding: 4px 12px; border-radius: 4px; border: 1px solid #008F83;
      background: transparent; color: #035C67;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .action-btn:hover { background: #035C67; color: #fff; border-color: #035C67; }
    .action-btn.primary { background: #035C67; color: #fff; }
    .action-btn.primary:hover { background: #002F32; }
    .output-scroll { flex: 1; overflow-y: auto; padding: 16px; }
    .output-content {
      font-family: 'Courier New', monospace; font-size: 12.5px;
      line-height: 1.6; color: #002F32; white-space: pre-wrap; word-break: break-word;
    }
    .output-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #9ABEBC; text-align: center; gap: 8px;
    }
    .output-placeholder .ph-icon { font-size: 40px; }
    .output-placeholder .ph-title { font-size: 14px; font-weight: 700; color: #008F83; }
    .output-placeholder .ph-sub { font-size: 12px; max-width: 320px; }
    .loading-indicator { display: flex; align-items: center; gap: 10px; padding: 20px; color: #035C67; }
    .spinner {
      width: 18px; height: 18px; border: 2px solid #C8E0DC;
      border-top-color: #035C67; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Trigger Bar */
    .trigger-bar {
      background: #fff; border-top: 2px solid #D8E8E6;
      padding: 10px 14px; display: flex; align-items: center;
      gap: 10px; flex-shrink: 0; flex-wrap: wrap;
    }
    .trigger-label { font-size: 10px; font-weight: 700; color: #008F83; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
    .trigger-buttons { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .trigger-btn {
      padding: 6px 12px; border-radius: 4px; border: 1px solid #008F83;
      background: #E0F2F0; color: #035C67;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .trigger-btn:hover:not(:disabled) { background: #035C67; color: #fff; border-color: #035C67; }
    .trigger-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .custom-input-wrap { display: flex; gap: 6px; flex-shrink: 0; }
    .custom-input {
      padding: 6px 10px; border-radius: 4px; border: 1px solid #C8E0DC;
      background: #FAFAF8; font-size: 11px; color: #002F32; width: 200px; outline: none;
    }
    .custom-input:focus { border-color: #008F83; }
    .custom-send-btn {
      padding: 6px 12px; border-radius: 4px; background: #035C67;
      color: #fff; border: none; font-size: 11px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .custom-send-btn:hover:not(:disabled) { background: #002F32; }
    .custom-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Run History */
    .run-history {
      background: #E0F2F0; border-top: 1px solid #C8E0DC;
      flex-shrink: 0; max-height: 90px; overflow: hidden;
    }
    .history-header {
      padding: 4px 14px; font-size: 10px; font-weight: 700;
      color: #008F83; text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-items { display: flex; gap: 8px; padding: 0 14px 6px; overflow-x: auto; }
    .history-item {
      background: #fff; border: 1px solid #C8E0DC; border-radius: 4px;
      padding: 4px 8px; font-size: 10px; white-space: nowrap; color: #002F32; flex-shrink: 0;
    }
    .history-item .hi-bot { font-weight: 700; color: #035C67; }
    .history-item .hi-time { color: #999; }

    /* ═══ CONFIG TAB ══════════════════════════════════════════════════════ */
    .config-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #EDEBE7; }

    .config-summary-bar {
      background: #fff; border-bottom: 1px solid #D8E8E6;
      padding: 8px 20px; display: flex; gap: 24px; flex-shrink: 0; align-items: center;
    }
    .summary-stat { font-size: 11px; color: #5A8A86; }
    .summary-stat strong { color: #035C67; font-size: 14px; }

    .config-subtabs {
      display: flex; background: #fff;
      border-bottom: 2px solid #D8E8E6; flex-shrink: 0;
    }
    .config-subtab {
      padding: 10px 20px; border: none; background: transparent;
      font-size: 12px; font-weight: 600; color: #5A8A86; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
    }
    .config-subtab:hover { color: #035C67; background: #F8FFFE; }
    .config-subtab.active { color: #035C67; border-bottom-color: #035C67; background: #F0FAF8; }

    .config-content { flex: 1; overflow-y: auto; padding: 20px; }

    .config-section {
      background: #fff; border-radius: 6px;
      border: 1px solid #D8E8E6; margin-bottom: 16px; overflow: hidden;
    }
    .config-section-header {
      background: #E0F2F0; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #C8E0DC;
    }
    .config-section-title {
      font-size: 12px; font-weight: 700; color: #035C67;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .config-section-sub { font-size: 11px; color: #5A8A86; }

    .config-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .config-table th {
      background: #F0FAF8; padding: 8px 14px; text-align: left;
      font-size: 11px; font-weight: 700; color: #008F83;
      border-bottom: 1px solid #D8E8E6;
    }
    .config-table td {
      padding: 9px 14px; border-bottom: 1px solid #F0F0F0; vertical-align: middle;
    }
    .config-table tr:last-child td { border-bottom: none; }
    .config-table tr:hover td { background: rgba(3,92,103,0.03); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 10px;
      font-size: 10px; font-weight: 700;
    }
    .badge-active   { background: rgba(218,250,135,0.6); color: #1B5E20; border: 1px solid #B5E060; }
    .badge-inactive { background: #EEE; color: #888; border: 1px solid #DDD; }
    .badge-phone    { background: rgba(144,185,255,0.25); color: #0D47A1; border: 1px solid #90B9FF; }
    .badge-offline  { background: rgba(232,135,137,0.18); color: #8B0000; border: 1px solid #E88789; }
    .badge-mint     { background: rgba(62,255,192,0.2); color: #035C67; border: 1px solid #3EFFC0; }

    .icon-btn {
      padding: 3px 9px; border-radius: 3px; border: 1px solid transparent;
      background: transparent; cursor: pointer; font-size: 11px;
      transition: all 0.12s; color: #5A8A86; white-space: nowrap;
    }
    .icon-btn:hover { background: #E0F2F0; border-color: #C8E0DC; color: #035C67; }
    .icon-btn.danger:hover { background: rgba(234,83,83,0.1); border-color: rgba(234,83,83,0.3); color: #B71C1C; }

    .inline-edit { display: flex; gap: 6px; align-items: center; }
    .inline-input {
      padding: 5px 8px; border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; outline: none; background: #FAFAF8; color: #002F32;
    }
    .inline-input:focus { border-color: #035C67; box-shadow: 0 0 0 2px rgba(3,92,103,0.1); }
    .inline-select {
      padding: 5px 8px; border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; outline: none; background: #FAFAF8; color: #002F32; cursor: pointer;
    }
    .inline-select:focus { border-color: #035C67; }

    .add-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 14px; background: #F8FFFE; border-top: 1px solid #EEE;
    }
    .add-row-label { font-size: 11px; color: #5A8A86; font-weight: 600; flex-shrink: 0; }

    .btn-primary {
      padding: 5px 14px; border-radius: 4px; background: #035C67; color: #fff;
      border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #002F32; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      padding: 5px 14px; border-radius: 4px; background: transparent;
      color: #035C67; border: 1px solid #035C67;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: #E0F2F0; }

    /* Headcount grid */
    .headcount-wrap { padding: 16px; overflow-x: auto; }
    .headcount-table { border-collapse: collapse; font-size: 12px; white-space: nowrap; }
    .headcount-table th {
      padding: 8px 16px; background: #035C67; color: #fff;
      font-size: 11px; font-weight: 700; text-align: center;
    }
    .headcount-table th:first-child { text-align: left; min-width: 140px; }
    .headcount-table td { padding: 6px 10px; border: 1px solid #D8E8E6; text-align: center; }
    .headcount-table .trc-cell {
      background: #E0F2F0; font-weight: 700; color: #035C67;
      text-align: left; padding: 6px 16px; border: 1px solid #C8E0DC;
    }
    .headcount-table .total-cell {
      background: #F0FAF8; font-weight: 700; color: #035C67; border: 1px solid #C8E0DC;
    }
    .headcount-input {
      width: 56px; text-align: center; padding: 4px 6px;
      border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; font-weight: 600; color: #035C67; outline: none;
    }
    .headcount-input:focus { border-color: #035C67; }

    /* Thresholds */
    .threshold-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
    .threshold-card {
      background: #F8FFFE; border: 1px solid #D8E8E6;
      border-radius: 6px; padding: 14px;
    }
    .threshold-card-title {
      font-size: 12px; font-weight: 700; color: #035C67;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .threshold-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 12px;
    }
    .threshold-row:last-child { margin-bottom: 0; }
    .threshold-label { font-size: 11px; color: #5A8A86; font-weight: 600; flex: 1; }
    .threshold-hint { font-size: 10px; color: #9ABEBC; }
    .threshold-input {
      width: 64px; text-align: center; padding: 5px 6px;
      border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; font-weight: 600; color: #002F32; outline: none;
    }
    .threshold-input:focus { border-color: #035C67; }
    .threshold-divider { border: none; border-top: 1px solid #E0E0E0; margin: 10px 0; }

    /* Queue accordion */
    .queue-ws-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; cursor: pointer; user-select: none;
      border-bottom: 1px solid #F0F0F0; transition: background 0.12s;
    }
    .queue-ws-header:hover { background: #F8FFFE; }
    .queue-ws-header.open { background: #F0FAF8; border-bottom-color: #D8E8E6; }
    .queue-ws-name { font-weight: 700; color: #035C67; font-size: 12px; }
    .queue-ws-meta { font-weight: 400; color: #5A8A86; font-size: 11px; margin-left: 6px; }
    .queue-ws-count { font-size: 11px; color: #5A8A86; }

    /* ═══ STUB TABS ═══════════════════════════════════════════════════════ */
    .tab-stub {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #EDEBE7; gap: 10px;
    }
    .stub-icon { font-size: 52px; }
    .stub-title { font-size: 20px; font-weight: 700; color: #035C67; }
    .stub-sub { font-size: 13px; color: #5A8A86; max-width: 400px; text-align: center; line-height: 1.6; }
    .stub-coming {
      padding: 5px 16px; border-radius: 12px; background: #3EFFC0;
      color: #002F32; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    }
    .stub-details {
      font-size: 11px; color: #9ABEBC; text-align: center;
      max-width: 360px; line-height: 1.7;
    }
  </style>
</head>

<!-- ═══ BOT SYSTEM PROMPTS ════════════════════════════════════════════════════ -->

<script type="text/plain" id="prompt-intraday">
## RMG INTRADAY BOT v2.1 | RMG Intelligent Operations Platform
## Deploy: SharePoint Agent Instructions field. Knowledge source = data files only.

## IDENTITY
You are the RMG Intraday Operations Analyst. Execute every WFM analysis, produce every table, write every narrative. Show results — never describe what you would show.

## EXECUTION RULES
1. Run immediately on trigger. No gates. One question only if genuine ambiguity, then run.
2. Data load always first. Print status block, continue in same response.
3. You calculate. You produce tables. Analyst reviews and acts.
4. Follow steps in order. Fixed output formats — never reorder or rename sections.

## TASK TRIGGERS
Intraday Analysis: "morning outlook" · "midday" · "check in" · "how's today" · "AM outlook" · "full day outlook" · "how did we do" · "EOD"
Next Day Outlook: "next day" · "tomorrow" · "set up tomorrow"
Daily Summary: "daily summary" · "wrap up" · "leadership summary"

## DATA LOAD — ALWAYS FIRST
Load all files every session. Full contents — not summaries.
The DATA LOAD block has already been rendered in the UI. Use the data provided in this message as your knowledge source.

Print then continue:
```
DATA LOAD | [Date] | [Time]
✅/⚠️/❌ [Filename] — [count] | as of [time]
```
Auto-proceed all states. Missing/stale = caveats in output. Cache: intraday 30 min; reference full session. Net Staffing pre-calculated in Schedule file — read directly, never recalculate.

## SHARED LOGIC — APPLY TO ANY INTERVAL SET

### Net Staffing Classification (per queue from Dimension Table)
ONC: critical_floor = -3 | understaffing_floor = -1 | surplus_ceiling = 2
RARE: critical_floor = -2 | understaffing_floor = -1 | surplus_ceiling = 2
PACE: critical_floor = -2 | understaffing_floor = -1 | surplus_ceiling = 2
Critical: < critical_floor | At Risk: < 0 and >= critical_floor | At Threshold: = 0 | Adequate: > 0 and <= surplus_ceiling | Surplus: > surplus_ceiling

### Risk Windows (Layer 1)
Unbroken At Risk/Critical sequence per queue. window_flag_threshold = 2 intervals (30 min).
Produce window table: Queue · Start · End · Duration · Intervals · Avg Net Staff · Worst. Sort: duration desc, depth asc.

### Individual Spikes (Layer 2)
Single intervals below spike threshold (-2.0), not in a window.
Produce spike table: Queue · Interval · Net Staff · Threshold · Gap.

### Surplus Windows (Layer 3)
Consecutive Surplus intervals. surplus_window_threshold = 2 intervals.
Produce surplus table: Queue · Start · End · Duration · Avg Surplus · Rebalancing Option.

### Variance: Vol Var% = (Act − Fcst) ÷ Fcst | AHT Var% = (Act − Fcst) ÷ Fcst
volume_variance_flag = 15% | aht_variance_flag = 10%

## INTRADAY ANALYSIS

**Partition:** Split today's intervals: A — Actuals (confirmed vol + AHT) vs B — Forecast Only. State: `Actuals: [X] intervals | Forecast only: [Y] intervals`. All-forecast → Part 2 only. All-actuals → Part 1 only, no recommendations. Mixed → both.

**PART 1 — ACTUALS** (omit section if no actuals)
1. Metrics table: Actual · Forecast · Variance · Var% for Total Volume, Avg AHT, Avg Net Staff, Abandon Rate. Flag metrics exceeding thresholds.
2. Apply Risk Identification (Shared Logic) to actual Net Staffing → window table + spike table.
3. Top 5 variance intervals (top 10 if full-day): Queue, Interval, Act/Fcst Vol, Vol Var%, Act/Fcst AHT, AHT Var%, Net Staff, Status.

  const queues = trc === 'ALL' ? ['ONC', 'RARE', 'PACE'] : [trc];
  const result = {};
  const nowMinutes = date.getHours() * 60 + date.getMinutes();

  queues.forEach(q => {
    const cfg = QUEUE_CFG[q];
    const seed = dateNum + q.charCodeAt(0) * 7919;
    const rng = makeRng(seed);
    const rows = [];

    for (let h = 6; h < 20; h++) {
      for (let m = 0; m < 60; m += 30) {
        const intMin = h * 60 + m;
        const isActual = intMin < nowMinutes;
        const t = (h - 6) / 14;
        const volCurve = 0.45 + 0.55 * (Math.sin(Math.PI * t) * 0.7 + Math.sin(2.2 * Math.PI * t) * 0.3);

        const volFcst = Math.max(4, Math.round(cfg.baseVol * volCurve * (0.88 + rng() * 0.24)));
        const volAct  = isActual ? Math.max(0, Math.round(volFcst * (0.80 + rng() * 0.40))) : null;
        const ahtFcst = Math.round(cfg.baseAHT * (0.94 + rng() * 0.12));
        const ahtAct  = isActual ? Math.round(ahtFcst * (0.88 + rng() * 0.24)) : null;
        const reqFTE  = Math.ceil((volFcst * cfg.baseAHT) / 1800 * 1.10);
        const schedHC = Math.max(2, Math.round(cfg.baseSched * volCurve * (0.85 + rng() * 0.30)));
        const actHC   = isActual ? Math.max(0, Math.round(schedHC * (0.86 + rng() * 0.26))) : null;
        const netStaff = actHC !== null ? actHC - reqFTE : schedHC - reqFTE;

        const status =
          netStaff < cfg.critFloor    ? 'critical'  :
          netStaff < 0                ? 'at_risk'   :
          netStaff === 0              ? 'threshold' :
          netStaff > cfg.surplusCeil  ? 'surplus'   : 'adequate';

        rows.push({
          time: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,
          schedHC, actHC, reqFTE, netStaff,
          volFcst, volAct, ahtFcst, ahtAct,
          adherence: isActual ? (0.86 + rng() * 0.12).toFixed(2) : null,
          isActual, status, cfg,
        });
      }
    }
    result[q] = rows;
  });
  return result;
}

function generateWeeklyContext(trc, date) {
  const days = ['Mon','Tue','Wed','Thu','Fri'];
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  let md = `WEEKLY STAFFING SUMMARY — Week of ${date.toLocaleDateString()}\n\n`;
  days.forEach((day, di) => {
    md += `${day}:\n`;
    queues.forEach(q => {
      const rng = makeRng(date.getTime() + di * 997 + q.charCodeAt(0));
      const netAvg = ((rng() - 0.4) * 3).toFixed(1);
      const risk = parseFloat(netAvg) < 0 ? '⚠️ At Risk' : '✅ Adequate';
      md += `  ${q}: Avg Net Staff ${netAvg > 0 ? '+' : ''}${netAvg} | ${risk}\n`;
    });
  });
  return md;
}

function generateLongRangeContext(date) {
  const weeks = [];
  for (let i = 4; i >= 0; i--) {
    const d = new Date(date); d.setDate(d.getDate() - i * 7);
    const rng = makeRng(d.getTime());
    const shipFcst = Math.round(12500 + rng() * 2000);
    const shipAct  = i > 0 ? Math.round(shipFcst * (0.92 + rng() * 0.16)) : null;
    weeks.push({ label: `W-${i}`, shipFcst, shipAct, isActual: i > 0 });
  }
  let md = `LONG RANGE DATA — 5-Week Trend\n\n`;
  md += `| Week | Ship Fcst | Ship Act | Var%  | Workload% Fcst | Workload% Act | QPH Fcst | QPH Act |\n`;
  md += `|------|-----------|----------|-------|----------------|---------------|----------|---------|\n`;
  weeks.forEach(w => {
    const rng = makeRng(w.shipFcst);
    const varPct = w.shipAct ? (((w.shipAct - w.shipFcst) / w.shipFcst) * 100).toFixed(1) : 'n/a';
    const wkFcst = (88 + rng() * 10).toFixed(1);
    const wkAct  = w.isActual ? (parseFloat(wkFcst) * (0.94 + rng() * 0.12)).toFixed(1) : 'n/a';
    const qphF   = (42 + rng() * 6).toFixed(1);
    const qphA   = w.isActual ? (parseFloat(qphF) * (0.95 + rng() * 0.10)).toFixed(1) : 'n/a';
    md += `| ${w.label} | ${w.shipFcst.toLocaleString()} | ${w.shipAct ? w.shipAct.toLocaleString() : 'n/a'} | ${varPct}% | ${wkFcst}% | ${wkAct}% | ${qphF} | ${qphA} |\n`;
  });
  return md;
}

function generateIntelContext(data, trc, date) {
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  const actuals = queues.flatMap(q => (data[q] || []).filter(r => r.isActual));
  const issues   = actuals.filter(r => r.status === 'critical' || r.status === 'at_risk');
  const surpluses = actuals.filter(r => r.status === 'surplus');
  let md = `INTEL SOURCE SUMMARY — ${date.toLocaleDateString()}\n\n`;
  md += `Queues active: ${queues.join(', ')}\n`;
  md += `Actuals intervals: ${actuals.length}\n`;
  md += `At-risk/critical intervals: ${issues.length}\n`;
  md += `Surplus intervals: ${surpluses.length}\n\n`;
  md += `SIMULATED LOOP NOTE: Team has been monitoring ${queues[0]} queue pressure through mid-morning. `;
  md += `Schedule adherence trending normal. No escalations logged. `;
  md += `Leadership check-in scheduled for 3pm.`;
  return md;
}

function dataToMarkdownTable(data, trc) {
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  let md = '';
  queues.forEach(q => {
    const rows = data[q] || [];
    md += `\n### STAFFING GRID — ${q} (${QUEUE_CFG[q].label})\n`;
    md += `| Interval | Sched HC | Act HC | Req FTE | Net Staff | Vol Fcst | Vol Act | AHT Fcst | AHT Act | Adherence | Type   | Status    |\n`;
    md += `|----------|----------|--------|---------|-----------|----------|---------|----------|---------|-----------|--------|----------|\n`;
    rows.forEach(r => {
      md += `| ${r.time}     | ${r.schedHC}        | ${r.actHC !== null ? r.actHC : '—'}      | ${r.reqFTE}       | ${r.netStaff >= 0 ? '+' : ''}${r.netStaff}         | ${r.volFcst}       | ${r.volAct !== null ? r.volAct : '—'}      | ${r.ahtFcst}s     | ${r.ahtAct !== null ? r.ahtAct + 's' : '—'}      | ${r.adherence !== null ? r.adherence : '—'}        | ${r.isActual ? 'ACTUAL' : 'FCST'} | ${r.status.replace('_',' ').toUpperCase()} |\n`;
    });
  });
  return md;
}

function buildUserMessage(phrase, data, trc, dateStr, timeStr, botId) {
  const actualsCount = Object.values(data)[0]?.filter(r => r.isActual).length || 0;
  const todayDate = new Date();
  let context = '';
  if      (botId === 'shortrange')   context = generateWeeklyContext(trc, todayDate);
  else if (botId === 'longrange')    context = generateLongRangeContext(todayDate);
  else if (botId === 'intelligence') context = generateIntelContext(data, trc, todayDate);
  else                               context = dataToMarkdownTable(data, trc);

  const queueDims = Object.entries(QUEUE_CFG).map(([q, cfg]) =>
    `${q}: critFloor=${cfg.critFloor}, surplusCeil=${cfg.surplusCeil}, baseAHT=${cfg.baseAHT}s`
  ).join(' | ');

  return `Trigger: ${phrase}
Date: ${dateStr}
Time: ${timeStr}
TRC Selection: ${trc}
Actuals intervals loaded: ${actualsCount} of 28

QUEUE DIMENSION TABLE:
${queueDims}
window_flag_threshold=2 | spike_threshold=-2.0 | volume_variance_flag=15% | aht_variance_flag=10%

SYNTHETIC DATA CONTEXT (substitutes for SharePoint knowledge source):
${context}

---
Note: This is a prototype running on Claude. Data is synthetic and seeded by date. Bot prompts are production-identical.`;
}

// ─────────────────────────────────────────────────────────────────────────────
// CLAUDE API (via Vercel proxy — no CORS, no key in browser)
// ─────────────────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userMessage) {
  const resp = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2048,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }],
    }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }
  const json = await resp.json();
  return json.content[0].text;
}

// ─── TRC BUILDER ─────────────────────────────────────────────────────────────
function TRCBuilder({ config, setConfig }) {
  const [editId, setEditId]       = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const [showAdd, setShowAdd]     = useState(false);
  const [newId, setNewId]         = useState('');
  const [newLabel, setNewLabel]   = useState('');

  const trcs = config.trcs;

  const handleAdd = () => {
    const id = newId.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (!id || !newLabel.trim() || trcs[id]) return;
    setConfig(prev => ({
      ...prev,
      trcs: { ...prev.trcs, [id]: { label: newLabel.trim(), active: true } },
      headcount: {
        ...prev.headcount,
        [id]: Object.fromEntries(Object.keys(prev.workstreams).map(ws => [ws, 0])),
      },
    }));
    setNewId(''); setNewLabel(''); setShowAdd(false);
  };

  const handleToggle = (id) => {
    setConfig(prev => ({
      ...prev,
      trcs: { ...prev.trcs, [id]: { ...prev.trcs[id], active: !prev.trcs[id].active } },
    }));
  };

  const handleSaveEdit = (id) => {
    if (!editLabel.trim()) return;
    setConfig(prev => ({
      ...prev,
      trcs: { ...prev.trcs, [id]: { ...prev.trcs[id], label: editLabel.trim() } },
    }));
    setEditId(null);
  };

  const handleDelete = (id) => {
    setConfig(prev => {
      const { [id]: _, ...trcsRest } = prev.trcs;
      const { [id]: __, ...hcRest  } = prev.headcount;
      return { ...prev, trcs: trcsRest, headcount: hcRest };
    });
  };

  const totalQueues = Object.values(config.queueTemplates).reduce((n, qt) => n + qt.length, 0);

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">TRCs — {Object.keys(trcs).length} configured</span>
        <button className="btn-primary" onClick={() => setShowAdd(!showAdd)}>+ Add TRC</button>
      </div>
      <table className="config-table">
        <thead>
          <tr>
            <th style={{width:80}}>ID</th>
            <th>Label</th>
            <th style={{width:90}}>Status</th>
            <th style={{width:120}}>Total Queues</th>
            <th style={{width:160}}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {Object.entries(trcs).map(([id, trc]) => (
            <tr key={id}>
              <td><strong style={{color:'#035C67',fontFamily:'monospace'}}>{id}</strong></td>
              <td>
                {editId === id ? (
                  <span className="inline-edit">
                    <input className="inline-input" value={editLabel} autoFocus
                      onChange={e => setEditLabel(e.target.value)}
                      onKeyDown={e => { if(e.key==='Enter') handleSaveEdit(id); if(e.key==='Escape') setEditId(null); }}
                      style={{width:180}} />
                    <button className="btn-primary" style={{padding:'3px 10px',fontSize:'11px'}} onClick={() => handleSaveEdit(id)}>Save</button>
                    <button className="icon-btn" onClick={() => setEditId(null)}>✕</button>
                  </span>
                ) : trc.label}
              </td>
              <td>
                <span className={`badge ${trc.active ? 'badge-active' : 'badge-inactive'}`}>
                  {trc.active ? 'Active' : 'Inactive'}
                </span>
              </td>
              <td style={{color:'#5A8A86',fontSize:'11px'}}>
                {totalQueues} templates × <strong>{Object.keys(trcs).length}</strong> TRCs
              </td>
              <td>
                <span style={{display:'flex',gap:'4px'}}>
                  <button className="icon-btn" onClick={() => { setEditId(id); setEditLabel(trc.label); }}>Edit</button>
                  <button className="icon-btn" onClick={() => handleToggle(id)}>{trc.active ? 'Disable' : 'Enable'}</button>
                  <button className="icon-btn danger" onClick={() => handleDelete(id)}>Delete</button>
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {showAdd && (
        <div className="add-row">
          <span className="add-row-label">New TRC:</span>
          <input className="inline-input" placeholder="ID (e.g. MED)" style={{width:80}}
            value={newId} onChange={e => setNewId(e.target.value.toUpperCase())} maxLength={6}
            onKeyDown={e => e.key==='Enter' && handleAdd()} />
          <input className="inline-input" placeholder="Label (e.g. Medical)" style={{width:200}}
            value={newLabel} onChange={e => setNewLabel(e.target.value)}
            onKeyDown={e => e.key==='Enter' && handleAdd()} />
          <button className="btn-primary" disabled={!newId.trim()||!newLabel.trim()} onClick={handleAdd}>Add TRC</button>
          <button className="btn-secondary" onClick={() => { setShowAdd(false); setNewId(''); setNewLabel(''); }}>Cancel</button>
        </div>
      )}
    </div>
  );
}

                  </select>
                  <select className="inline-select" value={newChannel}
                    onChange={e => setNewChannel(e.target.value)}>
                    <option>Offline</option><option>Phone</option>
                  </select>
                  <button className="btn-primary" disabled={!newLabel.trim()}
                    onClick={() => handleAddQueue(wsId)}>Add</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── THRESHOLD CONTROLS ───────────────────────────────────────────────────────
function ThresholdControls({ config, setConfig }) {
  const update = (channel, field, val) => {
    const n = parseFloat(val);
    if (isNaN(n)) return;
    setConfig(prev => ({
      ...prev,
      thresholds: {
        ...prev.thresholds,
        [channel]: { ...prev.thresholds[channel], [field]: n },
      },
    }));
  };

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">Threshold Controls</span>
        <span className="config-section-sub">Applies channel-wide. Override per queue in Queue Builder.</span>
      </div>
      <div className="threshold-grid">
        {Object.entries(config.thresholds).map(([channel, t]) => (
          <div key={channel} className="threshold-card">
            <div className="threshold-card-title">
              <span className={`badge ${channel==='Phone' ? 'badge-phone' : 'badge-offline'}`}>{channel}</span>
              {channel} Thresholds
            </div>
            <div className="threshold-row">
              <div>
                <div className="threshold-label">Under Threshold</div>
                <div className="threshold-hint">Net staff ≤ this → ALERT</div>
              </div>
              <input className="threshold-input" type="number" step="0.5"
                value={t.under} onChange={e => update(channel, 'under', e.target.value)} />
            </div>
            <div className="threshold-row">
              <div>
                <div className="threshold-label">Escalate Threshold</div>
                <div className="threshold-hint">Net staff ≤ this → ESCALATE</div>
              </div>
              <input className="threshold-input" type="number" step="0.5"
                value={t.escalate} onChange={e => update(channel, 'escalate', e.target.value)} />
            </div>
            <div className="threshold-row">
              <div>
                <div className="threshold-label">Surplus Threshold</div>
                <div className="threshold-hint">Net staff ≥ this → SURPLUS</div>
              </div>
              <input className="threshold-input" type="number" step="0.5"
                value={t.surplus} onChange={e => update(channel, 'surplus', e.target.value)} />
            </div>
            <hr className="threshold-divider" />
            <div className="threshold-row">
              <div>
                <div className="threshold-label">
                  {channel === 'Phone' ? 'SL Target (%)' : 'TAT Target (hrs)'}
                </div>
                <div className="threshold-hint">
                  {channel === 'Phone' ? 'Speed of Answer % goal' : 'Turnaround time goal'}
                </div>
              </div>
              <input className="threshold-input" type="number"
                step={channel === 'Phone' ? 5 : 0.5}
                value={channel === 'Phone' ? (t.slTarget ?? 80) : (t.tatTarget ?? 4)}
                onChange={e => update(channel, channel==='Phone'?'slTarget':'tatTarget', e.target.value)} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── HEADCOUNT GRID ───────────────────────────────────────────────────────────
function HeadcountGrid({ config, setConfig }) {
  const trcs = Object.keys(config.trcs);
  const wss  = Object.keys(config.workstreams);

  const total = trcs.reduce((sum, trc) =>
    sum + wss.reduce((s2, ws) => s2 + (config.headcount[trc]?.[ws] || 0), 0), 0
  );

  const update = (trc, ws, val) => {
    const n = Math.max(0, parseInt(val) || 0);
    setConfig(prev => ({
      ...prev,
      headcount: {
        ...prev.headcount,
        [trc]: { ...prev.headcount[trc], [ws]: n },
      },
    }));
  };

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">Headcount Grid</span>
        <span className="config-section-sub">
          Total: <strong style={{color:'#035C67'}}>{total}</strong> agents across all TRCs
        </span>
      </div>
      <div className="headcount-wrap">
        <table className="headcount-table">
          <thead>
            <tr>
              <th>TRC</th>
              {wss.map(ws => <th key={ws}>{ws}</th>)}
              <th>Row Total</th>
            </tr>
          </thead>
          <tbody>
            {trcs.map(trc => {
              const rowTotal = wss.reduce((s, ws) => s + (config.headcount[trc]?.[ws] || 0), 0);
              return (
                <tr key={trc}>
                  <td className="trc-cell">
                    <strong>{trc}</strong>
                    <span style={{fontWeight:400,color:'#5A8A86',marginLeft:6,fontSize:'11px'}}>
                      {config.trcs[trc]?.label}
                    </span>
                  </td>
                  {wss.map(ws => (
                    <td key={ws}>
                      <input className="headcount-input" type="number" min="0" max="99"
                        value={config.headcount[trc]?.[ws] || 0}
                        onChange={e => update(trc, ws, e.target.value)} />
                    </td>
                  ))}
                  <td className="total-cell">{rowTotal}</td>
                </tr>
              );
            })}
            <tr>
              <td className="trc-cell" style={{fontWeight:700,color:'#002F32'}}>Col Total</td>
              {wss.map(ws => (
                <td key={ws} className="total-cell">
                  {trcs.reduce((s, trc) => s + (config.headcount[trc]?.[ws] || 0), 0)}
                </td>
              ))}
              <td className="total-cell" style={{fontSize:'14px'}}><strong>{total}</strong></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── CONFIG TAB (container) ───────────────────────────────────────────────────
function ConfigTab({ config, setConfig }) {
  const [subTab, setSubTab] = useState('trcs');

  const queueCount = Object.values(config.queueTemplates).reduce((n, qt) => n + qt.length, 0)
                   * Object.keys(config.trcs).length;
  const agentCount = Object.values(config.headcount).reduce(
    (sum, hc) => sum + Object.values(hc).reduce((s, n) => s + n, 0), 0
  );

  const subTabs = [
    { id: 'trcs',        label: '⚙ TRCs'             },
    { id: 'workstreams', label: '🏗 Workstreams'       },
    { id: 'queues',      label: '📋 Queue Templates'  },
    { id: 'thresholds',  label: '📏 Thresholds'       },
    { id: 'headcount',   label: '👥 Headcount'        },
  ];

  return (
    <div className="config-page">
      {/* Summary bar */}
      <div className="config-summary-bar">
        <div className="summary-stat"><strong>{Object.keys(config.trcs).length}</strong> TRCs</div>
        <div className="summary-stat"><strong>{Object.keys(config.workstreams).length}</strong> Workstreams</div>
        <div className="summary-stat"><strong>{Object.values(config.queueTemplates).reduce((n,qt) => n+qt.length, 0)}</strong> Templates</div>
        <div className="summary-stat"><strong>{queueCount}</strong> Active Queues</div>
        <div className="summary-stat"><strong>{agentCount}</strong> Agents</div>
      </div>
      {/* Sub-tabs */}
      <div className="config-subtabs">
        {subTabs.map(t => (
          <button key={t.id} className={`config-subtab ${subTab===t.id?'active':''}`}
            onClick={() => setSubTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>
      {/* Content */}
      <div className="config-content">
        {subTab === 'trcs'        && <TRCBuilder config={config} setConfig={setConfig} />}
        {subTab === 'workstreams' && <WorkstreamBuilder config={config} setConfig={setConfig} />}
        {subTab === 'queues'      && <QueueBuilder config={config} setConfig={setConfig} />}
        {subTab === 'thresholds'  && <ThresholdControls config={config} setConfig={setConfig} />}
        {subTab === 'headcount'   && <HeadcountGrid config={config} setConfig={setConfig} />}
      </div>
    </div>
  );
}

function DataLoadBlock({ bot, dateStr, timeStr, actualsCount }) {
  const cfg   = BOT_CONFIGS[bot];
  const files = cfg.dataLoadFiles ? cfg.dataLoadFiles(dateStr, actualsCount) : [];
  const loadType = bot === 'intelligence' ? 'INTEL LOAD' : 'DATA LOAD';

  return (
    <div className="data-load-block">
      <div className="dl-header">{loadType} | {dateStr} | {timeStr}</div>
      {files.map((f, i) => (
        <div key={i} className="dl-row">
          {f.icon} {f.name} — <span style={{color:'#5A8A86'}}>{f.detail}</span>
        </div>
      ))}
    </div>
  );
}

function StaffingGrid({ data, trc }) {
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  const [viewQ, setViewQ] = useState(queues[0]);
  useEffect(() => { setViewQ(queues[0]); }, [trc]);

  const rows = data[viewQ] || [];
  const statusClass = (s) => ({
    critical:'status-critical', at_risk:'status-at_risk',
    threshold:'status-threshold', adequate:'status-adequate', surplus:'status-surplus',
  }[s] || '');

  return (
    <>
      {trc === 'ALL' && (
        <div style={{display:'flex',gap:'4px',padding:'6px 12px',background:'#F0FAF8',borderBottom:'1px solid #C8E0DC'}}>
          {queues.map(q => (
            <button key={q} onClick={() => setViewQ(q)} style={{
              padding:'2px 10px', borderRadius:'10px', border:'1px solid',
              borderColor: viewQ===q ? '#035C67' : '#C8E0DC',
              background: viewQ===q ? '#035C67' : 'transparent',
              color: viewQ===q ? '#fff' : '#5A8A86',
              fontSize:'11px', fontWeight:600, cursor:'pointer',
            }}>{q}</button>
          ))}
        </div>
      )}
      <div className="grid-scroll">
        <table className="staffing-table">
          <thead>
            <tr>
              <th>Time</th><th>Sched</th><th>Act</th>
              <th>Req</th><th>Net</th><th>VolF</th><th>VolA</th><th>Type</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} className={!r.isActual ? 'status-forecast' : ''}>
                <td className="time-col">{r.time}</td>
                <td>{r.schedHC}</td>
                <td>{r.actHC !== null ? r.actHC : '—'}</td>
                <td>{r.reqFTE}</td>
                <td className={`net-col ${r.isActual ? statusClass(r.status) : ''}`}>
                  {r.netStaff >= 0 ? '+' : ''}{r.netStaff}
                </td>
                <td>{r.volFcst}</td>
                <td>{r.volAct !== null ? r.volAct : '—'}</td>
                <td style={{fontSize:'9px',color: r.isActual ? '#035C67':'#AAA'}}>
                  {r.isActual ? 'ACT' : 'FCST'}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="legend">
        {[
          {cls:'status-critical', label:'Escalate'},
          {cls:'status-at_risk',  label:'At Risk'},
          {cls:'status-threshold',label:'Threshold'},
          {cls:'status-adequate', label:'Adequate'},
          {cls:'status-surplus',  label:'Surplus'},
        ].map(({cls, label}) => (
          <div key={label} className="legend-item">
            <div className={`legend-dot ${cls}`}/>
            <span style={{color:'#5A8A86'}}>{label}</span>
          </div>
        ))}
      </div>
    </>
  );
}

function AnalysisPanel({ output, isLoading, onCopy, onClear }) {
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [output]);

  return (
    <div className="analysis-panel">
      <div className="analysis-header">
        <div className="analysis-header-left">ANALYSIS OUTPUT</div>
        <div className="analysis-header-right">
          {output && !isLoading && (
            <>
              <button className="action-btn" onClick={onCopy}>Copy</button>
              <button className="action-btn" onClick={onClear}>New Run</button>
            </>
          )}
        </div>
      </div>
      <div className="output-scroll" ref={scrollRef}>
        {isLoading && (
          <div className="loading-indicator">
            <div className="spinner"/>
            <span style={{fontSize:'12px',color:'#008F83'}}>Claude is analyzing…</span>
          </div>
        )}
        {!isLoading && output && (
          <div className="output-content">{output}</div>
        )}
        {!isLoading && !output && (
          <div className="output-placeholder">
            <div className="ph-icon">⚡</div>
            <div className="ph-title">Ready for Analysis</div>
            <p className="ph-sub">
              Select a trigger below or type a custom phrase.
              Claude will load the data and run the full analysis.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

function TriggerBar({ activeBot, onTrigger, isLoading }) {
  const [custom, setCustom] = useState('');
  const cfg = BOT_CONFIGS[activeBot];

  const fire = (phrase) => {
    if (isLoading) return;
    setCustom('');
    onTrigger(phrase);
  };

  return (
    <div className="trigger-bar">
      <div className="trigger-label">Triggers</div>
      <div className="trigger-buttons">
        {cfg.triggers.map(t => (
          <button key={t.phrase} className="trigger-btn"
            disabled={isLoading} onClick={() => fire(t.phrase)}>
            {t.label}
          </button>
        ))}
      </div>
      <div className="custom-input-wrap">
        <input
          className="custom-input"
          placeholder="Custom phrase…"
          value={custom}
          onChange={e => setCustom(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && custom.trim() && fire(custom.trim())}
          disabled={isLoading}
        />
        <button className="custom-send-btn"
          disabled={isLoading || !custom.trim()}
          onClick={() => fire(custom.trim())}>
          Run →
        </button>
      </div>
    </div>
  );
}

function RunHistory({ history }) {
  if (history.length === 0) return null;
  return (
    <div className="run-history">
      <div className="history-header">
        <span>Session Run History ({history.length})</span>
      </div>
      <div className="history-items">
        {history.map((h, i) => (
          <div key={i} className="history-item">
            <span className="hi-bot">{h.bot} {h.version}</span>
            {' · '}{h.trc}{' · '}<em>{h.phrase}</em>{' '}
            <span className="hi-time">{h.time}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── OPERATIONS TAB (wrapper) ─────────────────────────────────────────────────
function OperationsTab({ activeTRC }) {
  const [activeBot, setActiveBot] = useState('intraday');
  const [output,    setOutput]    = useState('');
  const [loading,   setLoading]   = useState(false);
  const [history,   setHistory]   = useState([]);

  const today       = useMemo(() => new Date(), []);
  const dateStr     = today.toISOString().split('T')[0];
  const timeStr     = today.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const data        = useMemo(() => generateData(activeTRC, today), [activeTRC]);
  const actualsCount = useMemo(() => {
    const rows = Object.values(data)[0] || [];
    return rows.filter(r => r.isActual).length;
  }, [data]);

  const handleTrigger = useCallback(async (phrase) => {
    const bot = BOT_CONFIGS[activeBot];
    const systemPrompt = document.getElementById(bot.promptId)?.textContent?.trim() || '';
    const userMessage  = buildUserMessage(phrase, data, activeTRC, dateStr, timeStr, activeBot);

    setLoading(true);
    setOutput('');
    try {
      const result = await callClaude(systemPrompt, userMessage);
      setOutput(result);
      setHistory(prev => [
        { bot: bot.name, version: bot.version, phrase, trc: activeTRC, time: timeStr },
        ...prev.slice(0, 11),
      ]);
    } catch (err) {
      setOutput(`❌ Error: ${err.message}\n\nTip: Make sure ANTHROPIC_API_KEY is set in Vercel environment variables.`);
    }
    setLoading(false);
  }, [activeBot, activeTRC, data, dateStr, timeStr]);

  return (
    <div className="ops-shell">
      {/* Bot sub-tabs */}
      <div className="ops-bot-tabs">
        {Object.values(BOT_CONFIGS).map(b => (
          <button key={b.id}
            className={`ops-bot-tab ${activeBot===b.id ? 'active' : ''}`}
            onClick={() => { setActiveBot(b.id); setOutput(''); }}>
            {b.icon} {b.name} <span className="ver">{b.version}</span>
          </button>
        ))}
      </div>

      {/* Data panel + Analysis panel */}
      <div className="main-content">
        <div className="data-panel">
          <div className="panel-header">
            DATA PANEL — {activeTRC} · {BOT_CONFIGS[activeBot].name.toUpperCase()}
          </div>
          <DataLoadBlock bot={activeBot} dateStr={dateStr} timeStr={timeStr} actualsCount={actualsCount} />
          <StaffingGrid data={data} trc={activeTRC} />
        </div>
        <AnalysisPanel
          output={output}
          isLoading={loading}
          onCopy={() => navigator.clipboard.writeText(output).catch(() => {})}
          onClear={() => setOutput('')}
        />
      </div>

      <TriggerBar activeBot={activeBot} onTrigger={handleTrigger} isLoading={loading} />
      <RunHistory history={history} />
    </div>
  );
}
