<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RMG Intelligent Operations Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: Arial, sans-serif;
      background: #EDEBE7;
      color: #002F32;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #D8E8E6; }
    ::-webkit-scrollbar-thumb { background: #008F83; border-radius: 3px; }

    /* ═══ APP SHELL ═══════════════════════════════════════════════════════ */
    .app-shell {
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ═══ HEADER ══════════════════════════════════════════════════════════ */
    .header {
      background: #035C67;
      padding: 0 16px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; min-height: 48px;
      border-bottom: 2px solid #008F83;
    }
    .header-logo {
      font-size: 13px; font-weight: 700; color: #fff;
      letter-spacing: 0.5px; white-space: nowrap; flex-shrink: 0;
    }
    .header-logo span { color: #3EFFC0; }

    /* Module nav tabs */
    .module-tabs { display: flex; gap: 2px; flex: 1; }
    .module-tab {
      padding: 0 16px; height: 48px; border: none;
      background: transparent; color: rgba(255,255,255,0.65);
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.15s; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .module-tab:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .module-tab.active { color: #fff; border-bottom-color: #3EFFC0; }

    /* TRC selector */
    .trc-selector { display: flex; gap: 4px; flex-shrink: 0; }
    .trc-btn {
      padding: 4px 10px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent; color: rgba(255,255,255,0.7);
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .trc-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .trc-btn.active { background: #008F83; border-color: #008F83; color: #fff; }

    /* ═══ OPERATIONS TAB ══════════════════════════════════════════════════ */
    .ops-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Bot sub-tabs (inside Operations) */
    .ops-bot-tabs {
      display: flex; gap: 0; background: #fff;
      border-bottom: 2px solid #D8E8E6;
      flex-shrink: 0; padding: 0 8px;
    }
    .ops-bot-tab {
      padding: 0 14px; height: 40px; border: none;
      background: transparent; color: #5A8A86;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .ops-bot-tab:hover { color: #035C67; background: #F0FAF8; }
    .ops-bot-tab.active { color: #035C67; border-bottom-color: #035C67; }
    .ops-bot-tab .ver { font-size: 10px; opacity: 0.6; font-weight: 400; }

    /* Main layout (data panel + analysis panel) */
    .main-content { display: flex; flex: 1; overflow: hidden; }

    /* Data Panel */
    .data-panel {
      width: 340px; flex-shrink: 0; background: #fff;
      border-right: 1px solid #D8E8E6;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      background: #E0F2F0; padding: 8px 12px;
      border-bottom: 1px solid #C8E0DC;
      font-size: 11px; font-weight: 700; color: #035C67;
      letter-spacing: 0.5px; flex-shrink: 0;
    }
    .data-load-block {
      padding: 8px 12px; background: #F8FFFE;
      border-bottom: 1px solid #C8E0DC;
      font-size: 10.5px; font-family: 'Courier New', monospace;
      color: #002F32; flex-shrink: 0;
    }
    .data-load-block .dl-header { font-weight: 700; color: #035C67; margin-bottom: 4px; }
    .data-load-block .dl-row { margin: 1px 0; }
    .grid-scroll { flex: 1; overflow-y: auto; }

    /* Staffing table */
    .staffing-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .staffing-table thead th {
      background: #035C67; color: #fff;
      padding: 5px 6px; font-size: 10px; font-weight: 700;
      position: sticky; top: 0; z-index: 1;
      text-align: center; white-space: nowrap;
    }
    .staffing-table tbody td {
      padding: 3px 6px; text-align: center;
      border-bottom: 1px solid #EEE;
      font-family: 'Courier New', monospace; font-size: 10.5px;
    }
    .staffing-table tbody tr:hover { background: rgba(3,92,103,0.05); }
    .staffing-table .time-col { font-weight: 700; color: #035C67; text-align: left; }
    .staffing-table .net-col { font-weight: 700; }

    /* Status colors (brand-accurate) */
    .status-critical  { background: rgba(234,83,83,0.18); color: #B71C1C; }
    .status-at_risk   { background: rgba(232,135,137,0.22); color: #8B0000; }
    .status-threshold { background: #FFFDE7; color: #6D4C41; }
    .status-adequate  { background: rgba(218,250,135,0.35); color: #1B5E20; }
    .status-surplus   { background: rgba(144,185,255,0.28); color: #0D47A1; }
    .status-forecast  { color: #888; font-style: italic; }

    .legend { display: flex; gap: 6px; padding: 6px 12px; flex-wrap: wrap; flex-shrink: 0; border-top: 1px solid #D8E8E6; }
    .legend-item { display: flex; align-items: center; gap: 3px; font-size: 9.5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* Analysis Panel */
    .analysis-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #FAFAF8;
    }
    .analysis-header {
      padding: 8px 14px; background: #E0F2F0;
      border-bottom: 1px solid #C8E0DC;
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .analysis-header-left { font-size: 11px; font-weight: 700; color: #035C67; letter-spacing: 0.5px; }
    .analysis-header-right { display: flex; gap: 8px; }
    .action-btn {
      padding: 4px 12px; border-radius: 4px; border: 1px solid #008F83;
      background: transparent; color: #035C67;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .action-btn:hover { background: #035C67; color: #fff; border-color: #035C67; }
    .action-btn.primary { background: #035C67; color: #fff; }
    .action-btn.primary:hover { background: #002F32; }
    .output-scroll { flex: 1; overflow-y: auto; padding: 16px; }
    .output-content {
      font-family: 'Courier New', monospace; font-size: 12.5px;
      line-height: 1.6; color: #002F32; white-space: pre-wrap; word-break: break-word;
    }
    .output-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #9ABEBC; text-align: center; gap: 8px;
    }
    .output-placeholder .ph-icon { font-size: 40px; }
    .output-placeholder .ph-title { font-size: 14px; font-weight: 700; color: #008F83; }
    .output-placeholder .ph-sub { font-size: 12px; max-width: 320px; }
    .loading-indicator { display: flex; align-items: center; gap: 10px; padding: 20px; color: #035C67; }
    .spinner {
      width: 18px; height: 18px; border: 2px solid #C8E0DC;
      border-top-color: #035C67; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Trigger Bar */
    .trigger-bar {
      background: #fff; border-top: 2px solid #D8E8E6;
      padding: 10px 14px; display: flex; align-items: center;
      gap: 10px; flex-shrink: 0; flex-wrap: wrap;
    }
    .trigger-label { font-size: 10px; font-weight: 700; color: #008F83; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
    .trigger-buttons { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .trigger-btn {
      padding: 6px 12px; border-radius: 4px; border: 1px solid #008F83;
      background: #E0F2F0; color: #035C67;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .trigger-btn:hover:not(:disabled) { background: #035C67; color: #fff; border-color: #035C67; }
    .trigger-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .custom-input-wrap { display: flex; gap: 6px; flex-shrink: 0; }
    .custom-input {
      padding: 6px 10px; border-radius: 4px; border: 1px solid #C8E0DC;
      background: #FAFAF8; font-size: 11px; color: #002F32; width: 200px; outline: none;
    }
    .custom-input:focus { border-color: #008F83; }
    .custom-send-btn {
      padding: 6px 12px; border-radius: 4px; background: #035C67;
      color: #fff; border: none; font-size: 11px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    .custom-send-btn:hover:not(:disabled) { background: #002F32; }
    .custom-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Run History */
    .run-history {
      background: #E0F2F0; border-top: 1px solid #C8E0DC;
      flex-shrink: 0; max-height: 90px; overflow: hidden;
    }
    .history-header {
      padding: 4px 14px; font-size: 10px; font-weight: 700;
      color: #008F83; text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-items { display: flex; gap: 8px; padding: 0 14px 6px; overflow-x: auto; }
    .history-item {
      background: #fff; border: 1px solid #C8E0DC; border-radius: 4px;
      padding: 4px 8px; font-size: 10px; white-space: nowrap; color: #002F32; flex-shrink: 0;
    }
    .history-item .hi-bot { font-weight: 700; color: #035C67; }
    .history-item .hi-time { color: #999; }

    /* ═══ CONFIG TAB ══════════════════════════════════════════════════════ */
    .config-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #EDEBE7; }

    .config-summary-bar {
      background: #fff; border-bottom: 1px solid #D8E8E6;
      padding: 8px 20px; display: flex; gap: 24px; flex-shrink: 0; align-items: center;
    }
    .summary-stat { font-size: 11px; color: #5A8A86; }
    .summary-stat strong { color: #035C67; font-size: 14px; }

    .config-subtabs {
      display: flex; background: #fff;
      border-bottom: 2px solid #D8E8E6; flex-shrink: 0;
    }
    .config-subtab {
      padding: 10px 20px; border: none; background: transparent;
      font-size: 12px; font-weight: 600; color: #5A8A86; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
    }
    .config-subtab:hover { color: #035C67; background: #F8FFFE; }
    .config-subtab.active { color: #035C67; border-bottom-color: #035C67; background: #F0FAF8; }

    .config-content { flex: 1; overflow-y: auto; padding: 20px; }

    .config-section {
      background: #fff; border-radius: 6px;
      border: 1px solid #D8E8E6; margin-bottom: 16px; overflow: hidden;
    }
    .config-section-header {
      background: #E0F2F0; padding: 10px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #C8E0DC;
    }
    .config-section-title {
      font-size: 12px; font-weight: 700; color: #035C67;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .config-section-sub { font-size: 11px; color: #5A8A86; }

    .config-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .config-table th {
      background: #F0FAF8; padding: 8px 14px; text-align: left;
      font-size: 11px; font-weight: 700; color: #008F83;
      border-bottom: 1px solid #D8E8E6;
    }
    .config-table td {
      padding: 9px 14px; border-bottom: 1px solid #F0F0F0; vertical-align: middle;
    }
    .config-table tr:last-child td { border-bottom: none; }
    .config-table tr:hover td { background: rgba(3,92,103,0.03); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 10px;
      font-size: 10px; font-weight: 700;
    }
    .badge-active   { background: rgba(218,250,135,0.6); color: #1B5E20; border: 1px solid #B5E060; }
    .badge-inactive { background: #EEE; color: #888; border: 1px solid #DDD; }
    .badge-phone    { background: rgba(144,185,255,0.25); color: #0D47A1; border: 1px solid #90B9FF; }
    .badge-offline  { background: rgba(232,135,137,0.18); color: #8B0000; border: 1px solid #E88789; }
    .badge-mint     { background: rgba(62,255,192,0.2); color: #035C67; border: 1px solid #3EFFC0; }

    .icon-btn {
      padding: 3px 9px; border-radius: 3px; border: 1px solid transparent;
      background: transparent; cursor: pointer; font-size: 11px;
      transition: all 0.12s; color: #5A8A86; white-space: nowrap;
    }
    .icon-btn:hover { background: #E0F2F0; border-color: #C8E0DC; color: #035C67; }
    .icon-btn.danger:hover { background: rgba(234,83,83,0.1); border-color: rgba(234,83,83,0.3); color: #B71C1C; }

    .inline-edit { display: flex; gap: 6px; align-items: center; }
    .inline-input {
      padding: 5px 8px; border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; outline: none; background: #FAFAF8; color: #002F32;
    }
    .inline-input:focus { border-color: #035C67; box-shadow: 0 0 0 2px rgba(3,92,103,0.1); }
    .inline-select {
      padding: 5px 8px; border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; outline: none; background: #FAFAF8; color: #002F32; cursor: pointer;
    }
    .inline-select:focus { border-color: #035C67; }

    .add-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      padding: 10px 14px; background: #F8FFFE; border-top: 1px solid #EEE;
    }
    .add-row-label { font-size: 11px; color: #5A8A86; font-weight: 600; flex-shrink: 0; }

    .btn-primary {
      padding: 5px 14px; border-radius: 4px; background: #035C67; color: #fff;
      border: none; font-size: 11px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #002F32; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      padding: 5px 14px; border-radius: 4px; background: transparent;
      color: #035C67; border: 1px solid #035C67;
      font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { background: #E0F2F0; }

    /* Headcount grid */
    .headcount-wrap { padding: 16px; overflow-x: auto; }
    .headcount-table { border-collapse: collapse; font-size: 12px; white-space: nowrap; }
    .headcount-table th {
      padding: 8px 16px; background: #035C67; color: #fff;
      font-size: 11px; font-weight: 700; text-align: center;
    }
    .headcount-table th:first-child { text-align: left; min-width: 140px; }
    .headcount-table td { padding: 6px 10px; border: 1px solid #D8E8E6; text-align: center; }
    .headcount-table .trc-cell {
      background: #E0F2F0; font-weight: 700; color: #035C67;
      text-align: left; padding: 6px 16px; border: 1px solid #C8E0DC;
    }
    .headcount-table .total-cell {
      background: #F0FAF8; font-weight: 700; color: #035C67; border: 1px solid #C8E0DC;
    }
    .headcount-input {
      width: 56px; text-align: center; padding: 4px 6px;
      border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; font-weight: 600; color: #035C67; outline: none;
    }
    .headcount-input:focus { border-color: #035C67; }

    /* Thresholds */
    .threshold-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
    .threshold-card {
      background: #F8FFFE; border: 1px solid #D8E8E6;
      border-radius: 6px; padding: 14px;
    }
    .threshold-card-title {
      font-size: 12px; font-weight: 700; color: #035C67;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .threshold-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; gap: 12px;
    }
    .threshold-row:last-child { margin-bottom: 0; }
    .threshold-label { font-size: 11px; color: #5A8A86; font-weight: 600; flex: 1; }
    .threshold-hint { font-size: 10px; color: #9ABEBC; }
    .threshold-input {
      width: 64px; text-align: center; padding: 5px 6px;
      border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; font-weight: 600; color: #002F32; outline: none;
    }
    .threshold-input:focus { border-color: #035C67; }
    .threshold-divider { border: none; border-top: 1px solid #E0E0E0; margin: 10px 0; }

    /* Queue accordion */
    .queue-ws-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; cursor: pointer; user-select: none;
      border-bottom: 1px solid #F0F0F0; transition: background 0.12s;
    }
    .queue-ws-header:hover { background: #F8FFFE; }
    .queue-ws-header.open { background: #F0FAF8; border-bottom-color: #D8E8E6; }
    .queue-ws-name { font-weight: 700; color: #035C67; font-size: 12px; }
    .queue-ws-meta { font-weight: 400; color: #5A8A86; font-size: 11px; margin-left: 6px; }
    .queue-ws-count { font-size: 11px; color: #5A8A86; }

    /* ═══ STUB TABS ═══════════════════════════════════════════════════════ */
    .tab-stub {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #EDEBE7; gap: 10px;
    }
    .stub-icon { font-size: 52px; }
    .stub-title { font-size: 20px; font-weight: 700; color: #035C67; }
    .stub-sub { font-size: 13px; color: #5A8A86; max-width: 400px; text-align: center; line-height: 1.6; }
    .stub-coming {
      padding: 5px 16px; border-radius: 12px; background: #3EFFC0;
      color: #002F32; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    }
    .stub-details {
      font-size: 11px; color: #9ABEBC; text-align: center;
      max-width: 360px; line-height: 1.7;
    }

    /* ═══ EMPLOYEES TAB ═══════════════════════════════════════════════════════ */
    .emp-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #EDEBE7; }
    .emp-subtabs {
      display: flex; background: #fff;
      border-bottom: 2px solid #D8E8E6; flex-shrink: 0; padding: 0 8px;
    }
    .emp-subtab {
      padding: 0 16px; height: 40px; border: none;
      background: transparent; color: #5A8A86;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .emp-subtab:hover { color: #035C67; background: #F0FAF8; }
    .emp-subtab.active { color: #035C67; border-bottom-color: #035C67; }
    .emp-toolbar {
      background: #fff; border-bottom: 1px solid #D8E8E6;
      padding: 10px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
    }
    /* Profiles table */
    .profiles-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .profiles-table thead th {
      background: #035C67; color: #fff; padding: 7px 10px; font-size: 10.5px; font-weight: 700;
      position: sticky; top: 0; z-index: 1; text-align: left; white-space: nowrap;
    }
    .profiles-table tbody td { padding: 7px 10px; border-bottom: 1px solid #EEE; vertical-align: middle; }
    .profiles-table tbody tr:hover td { background: rgba(3,92,103,0.04); }
    .badge-trainee { background: rgba(232,135,137,0.2); color: #8B0000; border: 1px solid #E88789; }
    .badge-senior  { background: rgba(218,250,135,0.4); color: #1B5E20; border: 1px solid #B5E060; }
    .badge-primary-skill { background: rgba(62,255,192,0.2); color: #035C67; border: 1px solid #3EFFC0; }
    .badge-secondary-skill { background: rgba(144,185,255,0.2); color: #0D47A1; border: 1px solid #90B9FF; }
    /* Skills matrix */
    .skills-selector {
      display: flex; gap: 10px; align-items: center; padding: 12px 20px;
      background: #fff; border-bottom: 1px solid #D8E8E6; flex-shrink: 0; flex-wrap: wrap;
    }
    .skills-selector label { font-size: 11px; font-weight: 700; color: #5A8A86; }
    .skills-selector select {
      padding: 5px 10px; border: 1px solid #C8E0DC; border-radius: 4px;
      font-size: 12px; color: #002F32; background: #FAFAF8; outline: none; min-width: 260px;
    }
    .skills-selector select:focus { border-color: #035C67; }
    .skills-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .skills-table thead th {
      background: #035C67; color: #fff;
      padding: 6px 10px; font-size: 10.5px; font-weight: 700;
      position: sticky; top: 0; z-index: 1; white-space: nowrap;
    }
    .skills-table tbody td { padding: 6px 10px; border-bottom: 1px solid #EEE; }
    .skills-table tbody tr:hover td { background: rgba(3,92,103,0.04); }
    .skill-blocked { color: #CCC; font-style: italic; font-size: 10px; }
    /* Schedules table */
    .schedules-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .schedules-table thead th {
      background: #035C67; color: #fff;
      padding: 7px 10px; font-size: 10.5px; font-weight: 700;
      position: sticky; top: 0; z-index: 1; white-space: nowrap;
    }
    .schedules-table tbody td { padding: 7px 10px; border-bottom: 1px solid #EEE; }
    .schedules-table tbody tr:hover td { background: rgba(3,92,103,0.04); }
    .break-tag {
      display: inline-block; margin: 1px 2px; padding: 1px 6px;
      border-radius: 8px; font-size: 10px; font-weight: 600;
      background: rgba(144,185,255,0.25); color: #0D47A1; border: 1px solid #90B9FF;
    }
    .lunch-tag { background: rgba(218,250,135,0.4); color: #1B5E20; border: 1px solid #B5E060; }
    /* Data readiness */
    .readiness-item { display: flex; align-items: center; gap: 10px; padding: 7px 16px;
      background: #fff; margin-bottom: 4px; border-radius: 4px; border: 1px solid #E8E8E8; }
    .readiness-item.ready { color: #1B5E20; }
    .readiness-item.pending-item { color: #8B6914; }

    /* ═══ DATA ENGINE TAB ═════════════════════════════════════════════════════ */
    .data-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #EDEBE7; }
    .data-subtabs {
      display: flex; background: #fff;
      border-bottom: 2px solid #D8E8E6; flex-shrink: 0; padding: 0 8px;
    }
    .data-subtab {
      padding: 0 16px; height: 40px; border: none;
      background: transparent; color: #5A8A86;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.15s; display: flex; align-items: center; gap: 5px;
    }
    .data-subtab:hover { color: #035C67; background: #F0FAF8; }
    .data-subtab.active { color: #035C67; border-bottom-color: #035C67; }

    /* Scenario picker */
    .scenario-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
      padding: 16px 20px 0;
    }
    .scenario-card {
      background: #fff; border: 2px solid #D8E8E6; border-radius: 8px;
      padding: 14px; cursor: pointer; transition: all 0.15s;
    }
    .scenario-card:hover { border-color: #008F83; background: #F0FAF8; }
    .scenario-card.selected { border-color: #035C67; background: #E0F2F0; }
    .scenario-card-name { font-size: 12px; font-weight: 700; color: #035C67; margin-bottom: 4px; }
    .scenario-card-label { font-size: 11px; color: #5A8A86; margin-bottom: 8px; }
    .scenario-card-stats { display: flex; flex-wrap: wrap; gap: 4px; }
    .scenario-pill {
      font-size: 10px; padding: 2px 7px; border-radius: 8px;
      background: #E0F2F0; color: #035C67; font-weight: 600;
    }
    .scenario-pill.warn { background: rgba(232,135,137,0.2); color: #8B0000; }
    .scenario-pill.good { background: rgba(218,250,135,0.4); color: #1B5E20; }

    /* Custom controls */
    .custom-controls {
      background: #fff; border: 1px solid #D8E8E6; border-radius: 6px;
      margin: 12px 20px 0; padding: 14px;
    }
    .custom-controls-title { font-size: 11px; font-weight: 700; color: #035C67;
      margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .custom-control-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
    }
    .custom-control-row:last-child { margin-bottom: 0; }
    .custom-control-label { font-size: 11px; color: #5A8A86; font-weight: 600; width: 160px; flex-shrink: 0; }
    .custom-control-val { font-size: 11px; font-weight: 700; color: #035C67;
      width: 40px; text-align: right; flex-shrink: 0; }
    input[type=range] { flex: 1; accent-color: #035C67; height: 4px; }

    /* Generate bar */
    .generate-bar {
      background: #fff; border-top: 1px solid #D8E8E6;
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0; margin-top: 12px;
    }
    .btn-generate {
      padding: 8px 24px; border-radius: 4px; background: #035C67; color: #3EFFC0;
      border: none; font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background 0.15s; letter-spacing: 0.3px;
    }
    .btn-generate:hover:not(:disabled) { background: #002F32; }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Data preview */
    .preview-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      padding: 16px 20px;
    }
    .preview-stat {
      background: #fff; border-radius: 6px; border: 1px solid #D8E8E6;
      padding: 12px; text-align: center;
    }
    .preview-stat-val { font-size: 22px; font-weight: 700; color: #035C67; }
    .preview-stat-label { font-size: 10.5px; color: #5A8A86; margin-top: 3px; }
    .preview-risk-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .preview-risk-table thead th {
      background: #035C67; color: #fff; padding: 6px 10px;
      font-size: 10.5px; font-weight: 700; text-align: left; white-space: nowrap;
    }
    .preview-risk-table tbody td { padding: 6px 10px; border-bottom: 1px solid #EEE; }
    .preview-risk-table tbody tr:hover td { background: rgba(3,92,103,0.04); }

    /* ═══ SCHEDULE TAB ════════════════════════════════════════════════════════ */
    .sched-shell { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #EDEBE7; }
    .sched-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
    .sched-filters {
      background: #fff; border-bottom: 2px solid #D8E8E6;
      padding: 8px 16px; display: flex; gap: 14px; align-items: center; flex-shrink: 0; flex-wrap: wrap;
    }
    .sched-filter-group { display: flex; align-items: center; gap: 6px; }
    .sched-filter-group label { font-size: 10px; font-weight: 700; color: #5A8A86; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .sched-filter-group select { padding: 4px 8px; border: 1px solid #C8E0DC; border-radius: 4px; font-size: 11px; color: #002F32; background: #FAFAF8; outline: none; cursor: pointer; }
    .sched-filter-group select:focus { border-color: #035C67; }
    .sched-filter-group input[type=date] { padding: 4px 8px; border: 1px solid #C8E0DC; border-radius: 4px; font-size: 11px; color: #002F32; background: #FAFAF8; outline: none; }
    .sched-filter-group input[type=date]:focus { border-color: #035C67; }
    .sched-day-nav { display: flex; align-items: center; gap: 3px; }
    .sched-day-btn { padding: 3px 8px; border: 1px solid #C8E0DC; border-radius: 4px; background: #FAFAF8; color: #035C67; font-size: 11px; font-weight: 700; cursor: pointer; }
    .sched-day-btn:hover { background: #E0F2F0; border-color: #008F83; }
    .sched-view-toggle { display: flex; border: 1px solid #C8E0DC; border-radius: 4px; overflow: hidden; margin-left: auto; }
    .sched-view-btn { padding: 4px 12px; border: none; background: transparent; color: #5A8A86; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
    .sched-view-btn:hover { background: #E0F2F0; color: #035C67; }
    .sched-view-btn.active { background: #035C67; color: #3EFFC0; }
    /* Graph view */
    .sched-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sched-timeline-wrap { flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0; }
    .sched-row { display: flex; border-bottom: 1px solid #EEEEEE; flex-shrink: 0; }
    .sched-label-col { width: 160px; flex-shrink: 0; border-right: 2px solid #D8E8E6; background: #F8FFFE; padding: 5px 8px; display: flex; flex-direction: column; justify-content: center; overflow: visible; }
    .sched-bar-col { flex: 1; position: relative; overflow: hidden; min-width: 0; }
    .sched-header-row { height: 28px; position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 2px solid #D8E8E6; }
    .sched-hour-grid { position: absolute; inset: 0; pointer-events: none; }
    .sched-hour-tick { position: absolute; top: 0; bottom: 0; border-left: 1px solid #D8E8E6; font-size: 9px; font-weight: 700; color: #035C67; padding-left: 3px; display: flex; align-items: center; white-space: nowrap; }
    .sched-half-tick { position: absolute; top: 50%; bottom: 0; border-left: 1px dashed #E8E8E8; pointer-events: none; }
    .sched-coverage-row { height: 76px; flex-shrink: 0; background: #F8FFFE; border-bottom: 2px solid #C8E0DC; }
    .sched-cov-bars { background: #F0FAF8; }
    .sched-cov-bar { position: absolute; border-radius: 2px 2px 0 0; transition: opacity 0.1s; box-sizing: border-box; }
    .sched-cov-bar:hover { opacity: 0.75; }
    .sched-cov-label { position: absolute; top: 2px; font-size: 7.5px; font-weight: 700; white-space: nowrap; font-family: 'Courier New', monospace; pointer-events: none; }
    .sched-ws-divider { display: flex; height: 20px; flex-shrink: 0; border-bottom: 1px solid #C8E0DC; }
    .sched-agent-row { height: 42px; }
    .sched-agent-row:hover { background: rgba(3,92,103,0.04); }
    .sched-agent-name { font-size: 11.5px; font-weight: 600; color: #002F32; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35; }
    .sched-agent-meta { margin-top: 2px; }
    .sched-gridline { position: absolute; top: 0; bottom: 0; border-left: 1px solid rgba(200,224,220,0.4); pointer-events: none; }
    .sched-shift-bar { position: absolute; top: 3px; bottom: 3px; border-radius: 3px; }
    .sched-callout-stripe { position: absolute; top: 3px; bottom: 3px; border-radius: 3px; border: 1px dashed #EA5353; background: repeating-linear-gradient(45deg, rgba(234,83,83,0.15), rgba(234,83,83,0.15) 4px, transparent 4px, transparent 8px); }
    /* Break blocks sit on top of the shift bar — white/grey cutouts */
    .sched-break-block { position: absolute; top: 3px; bottom: 3px; border-radius: 2px; background: rgba(255,255,255,0.72); border: 1px solid rgba(180,210,205,0.9); pointer-events: none; z-index: 2; }
    .sched-lunch-block  { position: absolute; top: 3px; bottom: 3px; border-radius: 2px; background: rgba(255,255,255,0.85); border: 1px solid rgba(255,200,100,0.8); border-top: 2px solid #F5B942; pointer-events: none; z-index: 2; }
    /* Text view */
    .sched-text-body { flex: 1; overflow: auto; padding: 0; }
    .sched-text-section { margin-bottom: 0; }
    .sched-text-section-header { padding: 6px 16px; background: #E0F2F0; border-bottom: 1px solid #C8E0DC; font-size: 10px; font-weight: 700; color: #035C67; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 2; }
    .sched-text-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .sched-text-table thead th { background: #035C67; color: #fff; padding: 6px 10px; font-size: 10px; font-weight: 700; position: sticky; top: 32px; text-align: left; white-space: nowrap; z-index: 1; }
    .sched-text-table tbody td { padding: 5px 10px; border-bottom: 1px solid #F0F0F0; white-space: nowrap; }
    .sched-text-table tbody tr:hover td { background: rgba(3,92,103,0.04); }
    /* Legend */
    .sched-legend { background: #fff; border-top: 1px solid #D8E8E6; padding: 6px 16px; display: flex; gap: 20px; flex-shrink: 0; flex-wrap: wrap; }
    .sched-legend-section { display: flex; align-items: center; gap: 8px; }
    .sched-legend-title { font-size: 9px; font-weight: 700; color: #035C67; text-transform: uppercase; letter-spacing: 0.5px; }
    .sched-legend-item { display: flex; align-items: center; gap: 4px; font-size: 9.5px; color: #5A8A86; }

    /* ═══ BUILD PASS 4: DYNAMIC BOT VIEWS ═══════════════════════════════════ */
    .bp4-view { flex: 1; overflow-y: auto; min-height: 0; }
    .bp4-kpi-row {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 1px; background: #D8E8E6; border-bottom: 1px solid #D8E8E6;
      flex-shrink: 0;
    }
    .bp4-kpi { background: #fff; padding: 6px 4px; text-align: center; }
    .bp4-kpi-val { font-size: 14px; font-weight: 700; font-family: 'Courier New',monospace; line-height: 1.2; }
    .bp4-kpi-label { font-size: 8.5px; color: #5A8A86; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .bp4-kpi-sub { font-size: 8.5px; color: #9ABEBC; }
    .bp4-section-label {
      padding: 4px 10px; background: #E0F2F0;
      font-size: 9.5px; font-weight: 700; color: #035C67;
      letter-spacing: 0.5px; text-transform: uppercase;
      border-top: 1px solid #C8E0DC; border-bottom: 1px solid #C8E0DC;
    }
    .bp4-table-wrap { overflow-y: auto; overflow-x: hidden; }
    .bp4-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
    .bp4-table thead th {
      background: #F0FAF8; color: #035C67;
      padding: 4px 6px; font-size: 9.5px; font-weight: 700;
      position: sticky; top: 0; text-align: center;
      border-bottom: 1px solid #D8E8E6;
    }
    .bp4-table tbody td {
      padding: 2.5px 6px; text-align: center;
      border-bottom: 1px solid #F0F0F0;
      font-family: 'Courier New',monospace; font-size: 10px;
    }
    .bp4-table tbody tr:hover { background: rgba(3,92,103,0.04); }
    .bp4-table .time-col { text-align: left; font-weight: 700; color: #035C67; }
    .net-bad  { color: #B71C1C; font-weight: 700; background: rgba(234,83,83,0.12); }
    .net-warn { color: #8B0000; font-weight: 700; }
    .net-ok   { color: #1B5E20; font-weight: 700; }
    .bp4-risks { }
    .bp4-risk-row {
      display: flex; gap: 5px; align-items: center;
      padding: 3px 10px; border-bottom: 1px solid #F0F0F0; font-size: 9.5px;
    }
    .bp4-risk-queue { font-family: 'Courier New'; font-weight: 700; color: #035C67; flex: 1; font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bp4-risk-window { font-family: 'Courier New'; color: #5A8A86; font-size: 9px; flex-shrink: 0; }
    .bp4-risk-net { font-weight: 700; min-width: 26px; text-align: right; flex-shrink: 0; }
    .bp4-risk-dur { color: #9ABEBC; font-size: 9px; flex-shrink: 0; }
    .bp4-score-card {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: #F0FAF8; border-bottom: 1px solid #C8E0DC;
    }
    .bp4-score-grade { font-size: 34px; font-weight: 700; line-height: 1; font-family: 'Courier New'; flex-shrink: 0; }
    .bp4-score-info { flex: 1; }
    .bp4-hist-item { padding: 6px 10px; border-bottom: 1px solid #F0F0F0; }
    .bp4-hist-top { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }

    /* ─── Step 11: Demo Polish ────────────────────────────────────────────── */
    /* Header version badge */
    .header-version {
      font-size: 9px; font-weight: 500; color: rgba(62,255,192,0.5);
      font-family: 'Courier New'; margin-left: 10px; letter-spacing: 0.5px;
    }
    /* Demo button in header */
    .demo-btn {
      margin-left: auto; padding: 5px 14px; border-radius: 16px; cursor: pointer;
      background: linear-gradient(135deg, #3EFFC0 0%, #00CFAB 100%);
      color: #002F32; font-weight: 800; font-size: 12px; border: none;
      box-shadow: 0 0 12px rgba(62,255,192,0.35); transition: all 0.2s; white-space: nowrap;
      flex-shrink: 0;
    }
    .demo-btn:hover { box-shadow: 0 0 20px rgba(62,255,192,0.6); transform: translateY(-1px); }
    .demo-btn:active { transform: translateY(0); }
    /* Toast notification */
    .toast {
      position: fixed; top: 48px; left: 50%; transform: translateX(-50%);
      padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 600;
      z-index: 9999; pointer-events: none;
      animation: toast-in 0.3s ease, toast-out 0.4s ease 3s forwards;
      white-space: nowrap;
    }
    .toast-success { background: #3EFFC0; color: #002F32; box-shadow: 0 4px 20px rgba(62,255,192,0.5); }
    .toast-error   { background: #EA5353; color: #fff;    box-shadow: 0 4px 20px rgba(234,83,83,0.4);  }
    @keyframes toast-in  { from{opacity:0;top:36px} to{opacity:1;top:48px} }
    @keyframes toast-out { from{opacity:1}          to{opacity:0}          }
    /* Scenario description subtitle */
    .scenario-desc { font-size: 9px; color: #5A8A86; margin-top: 2px; font-style: italic; text-align: center; line-height: 1.3; max-width: 80px; }
    /* Operations empty / onboarding state */
    .ops-onboard {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1; padding: 40px 24px; text-align: center; background: #011E26;
    }
    .ops-onboard-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.8; }
    .ops-onboard-title { font-size: 20px; font-weight: 800; color: #3EFFC0; margin-bottom: 6px; }
    .ops-onboard-sub   { font-size: 12px; color: #5A8A86; max-width: 380px; line-height: 1.6; margin-bottom: 24px; }
    .ops-steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 340px; }
    .ops-step {
      display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px;
      background: rgba(62,255,192,0.05); border: 1px solid rgba(62,255,192,0.12);
      border-radius: 8px; text-align: left;
    }
    .ops-step-n {
      width: 22px; height: 22px; border-radius: 50%; background: rgba(62,255,192,0.15);
      color: #3EFFC0; font-size: 11px; font-weight: 800; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; font-family: 'Courier New';
    }
    .ops-step-text { font-size: 11px; color: #9ABEBC; line-height: 1.5; }
    .ops-step-text strong { color: #C8E8E4; }
    /* Download button in AnalysisPanel */
    .action-btn-dl { background: rgba(62,255,192,0.08); border-color: rgba(62,255,192,0.3); }

    /* ─── Step 12: TRC Compare + Flow Map ───────────────────────────────── */
    /* Bot tab separator + analytics tabs */
    .ops-tab-sep { width: 1px; background: rgba(62,255,192,0.2); margin: 8px 4px; align-self: stretch; flex-shrink: 0; }
    .ops-analytics-tab {
      padding: 0 14px; height: 40px; border: none;
      background: transparent; color: #5A8A86;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all 0.15s; display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .ops-analytics-tab:hover { color: #008F83; background: rgba(0,143,131,0.06); }
    .ops-analytics-tab.active { color: #008F83; border-bottom-color: #008F83; }

    /* TRC Compare */
    .trc-compare-shell { flex: 1; overflow: auto; padding: 16px; background: #EDEBE7; }
    .trc-compare-grid { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,47,50,0.08); }
    .trc-compare-grid th { background: #013A42; color: #3EFFC0; font-size: 11px; font-weight: 700; padding: 9px 14px; text-align: center; border: 1px solid rgba(62,255,192,0.12); white-space: nowrap; }
    .trc-compare-grid th:first-child { text-align: left; min-width: 180px; }
    .trc-compare-grid td { font-size: 12px; padding: 7px 14px; border: 1px solid rgba(0,47,50,0.07); text-align: center; background: #fff; }
    .trc-compare-grid tr:hover td { background: rgba(62,255,192,0.04); }
    .trc-ws-row td { background: #F0F8F6 !important; padding: 6px 14px !important; }
    .trc-ws-label { font-size: 10px; font-weight: 800; color: #5A8A86; text-transform: uppercase; letter-spacing: 0.7px; text-align: left !important; }
    .trc-queue-label { font-size: 12px; color: #002F32; text-align: left !important; padding-left: 22px !important; }
    .loan-card { background: #fff; border: 1px solid rgba(62,255,192,0.3); border-left: 3px solid #3EFFC0; border-radius: 6px; padding: 10px 14px; margin-top: 4px; }
    .loan-card-title { font-size: 10px; font-weight: 800; color: #3EFFC0; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .loan-row { font-size: 12px; color: #002F32; padding: 3px 0; border-bottom: 1px solid rgba(62,255,192,0.08); line-height: 1.5; }
    .loan-row:last-child { border-bottom: none; }

    /* Flow Map */
    .flow-map-shell { flex: 1; display: flex; overflow: hidden; background: #EDEBE7; }
    .flow-chain-panel { width: 320px; min-width: 320px; border-right: 2px solid #D8E8E6; overflow-y: auto; padding: 14px; background: #fff; }
    .flow-sim-panel { flex: 1; overflow-y: auto; padding: 14px; }
    .flow-chain-header { font-size: 11px; font-weight: 800; color: #5A8A86; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .flow-node { border: 1.5px solid #D8E8E6; border-radius: 8px; padding: 10px 12px; background: #FAFFFE; position: relative; }
    .flow-node.status-bottleneck { border-color: #EA5353; background: rgba(234,83,83,0.04); }
    .flow-node.status-near-cap   { border-color: #FFD166; background: rgba(255,209,102,0.04); }
    .flow-node.status-ok         { border-color: #3EFFC0; background: rgba(62,255,192,0.04); }

        const isActual = intMin < nowMinutes;
        const t = (h - 6) / 14;
        const volCurve = 0.45 + 0.55 * (Math.sin(Math.PI * t) * 0.7 + Math.sin(2.2 * Math.PI * t) * 0.3);

        const volFcst = Math.max(4, Math.round(cfg.baseVol * volCurve * (0.88 + rng() * 0.24)));
        const volAct  = isActual ? Math.max(0, Math.round(volFcst * (0.80 + rng() * 0.40))) : null;
        const ahtFcst = Math.round(cfg.baseAHT * (0.94 + rng() * 0.12));
        const ahtAct  = isActual ? Math.round(ahtFcst * (0.88 + rng() * 0.24)) : null;
        const reqFTE  = Math.ceil((volFcst * cfg.baseAHT) / 1800 * 1.10);
        const schedHC = Math.max(2, Math.round(cfg.baseSched * volCurve * (0.85 + rng() * 0.30)));
        const actHC   = isActual ? Math.max(0, Math.round(schedHC * (0.86 + rng() * 0.26))) : null;
        const netStaff = actHC !== null ? actHC - reqFTE : schedHC - reqFTE;

        const status =
          netStaff < cfg.critFloor    ? 'critical'  :
          netStaff < 0                ? 'at_risk'   :
          netStaff === 0              ? 'threshold' :
          netStaff > cfg.surplusCeil  ? 'surplus'   : 'adequate';

        rows.push({
          time: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,
          schedHC, actHC, reqFTE, netStaff,
          volFcst, volAct, ahtFcst, ahtAct,
          adherence: isActual ? (0.86 + rng() * 0.12).toFixed(2) : null,
          isActual, status, cfg,
        });
      }
    }
    result[q] = rows;
  });
  return result;
}

function generateWeeklyContext(trc, date) {
  const days = ['Mon','Tue','Wed','Thu','Fri'];
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  let md = `WEEKLY STAFFING SUMMARY — Week of ${date.toLocaleDateString()}\n\n`;
  days.forEach((day, di) => {
    md += `${day}:\n`;
    queues.forEach(q => {
      const rng = makeRng(date.getTime() + di * 997 + q.charCodeAt(0));
      const netAvg = ((rng() - 0.4) * 3).toFixed(1);
      const risk = parseFloat(netAvg) < 0 ? '⚠️ At Risk' : '✅ Adequate';
      md += `  ${q}: Avg Net Staff ${netAvg > 0 ? '+' : ''}${netAvg} | ${risk}\n`;
    });
  });
  return md;
}

function generateLongRangeContext(date) {
  const weeks = [];
  for (let i = 4; i >= 0; i--) {
    const d = new Date(date); d.setDate(d.getDate() - i * 7);
    const rng = makeRng(d.getTime());
    const shipFcst = Math.round(12500 + rng() * 2000);
    const shipAct  = i > 0 ? Math.round(shipFcst * (0.92 + rng() * 0.16)) : null;
    weeks.push({ label: `W-${i}`, shipFcst, shipAct, isActual: i > 0 });
  }
  let md = `LONG RANGE DATA — 5-Week Trend\n\n`;
  md += `| Week | Ship Fcst | Ship Act | Var%  | Workload% Fcst | Workload% Act | QPH Fcst | QPH Act |\n`;
  md += `|------|-----------|----------|-------|----------------|---------------|----------|---------|\n`;
  weeks.forEach(w => {
    const rng = makeRng(w.shipFcst);
    const varPct = w.shipAct ? (((w.shipAct - w.shipFcst) / w.shipFcst) * 100).toFixed(1) : 'n/a';
    const wkFcst = (88 + rng() * 10).toFixed(1);
    const wkAct  = w.isActual ? (parseFloat(wkFcst) * (0.94 + rng() * 0.12)).toFixed(1) : 'n/a';
    const qphF   = (42 + rng() * 6).toFixed(1);
    const qphA   = w.isActual ? (parseFloat(qphF) * (0.95 + rng() * 0.10)).toFixed(1) : 'n/a';
    md += `| ${w.label} | ${w.shipFcst.toLocaleString()} | ${w.shipAct ? w.shipAct.toLocaleString() : 'n/a'} | ${varPct}% | ${wkFcst}% | ${wkAct}% | ${qphF} | ${qphA} |\n`;
  });
  return md;
}

function generateIntelContext(data, trc, date) {
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  const actuals = queues.flatMap(q => (data[q] || []).filter(r => r.isActual));
  const issues   = actuals.filter(r => r.status === 'critical' || r.status === 'at_risk');
  const surpluses = actuals.filter(r => r.status === 'surplus');
  let md = `INTEL SOURCE SUMMARY — ${date.toLocaleDateString()}\n\n`;
  md += `Queues active: ${queues.join(', ')}\n`;
  md += `Actuals intervals: ${actuals.length}\n`;
  md += `At-risk/critical intervals: ${issues.length}\n`;
  md += `Surplus intervals: ${surpluses.length}\n\n`;
  md += `SIMULATED LOOP NOTE: Team has been monitoring ${queues[0]} queue pressure through mid-morning. `;
  md += `Schedule adherence trending normal. No escalations logged. `;
  md += `Leadership check-in scheduled for 3pm.`;
  return md;
}

function dataToMarkdownTable(data, trc) {
  const queues = trc === 'ALL' ? ['ONC','RARE','PACE'] : [trc];
  let md = '';
  queues.forEach(q => {
    const rows = data[q] || [];
    md += `\n### STAFFING GRID — ${q} (${QUEUE_CFG[q].label})\n`;
    md += `| Interval | Sched HC | Act HC | Req FTE | Net Staff | Vol Fcst | Vol Act | AHT Fcst | AHT Act | Adherence | Type   | Status    |\n`;
    md += `|----------|----------|--------|---------|-----------|----------|---------|----------|---------|-----------|--------|----------|\n`;
    rows.forEach(r => {
      md += `| ${r.time}     | ${r.schedHC}        | ${r.actHC !== null ? r.actHC : '—'}      | ${r.reqFTE}       | ${r.netStaff >= 0 ? '+' : ''}${r.netStaff}         | ${r.volFcst}       | ${r.volAct !== null ? r.volAct : '—'}      | ${r.ahtFcst}s     | ${r.ahtAct !== null ? r.ahtAct + 's' : '—'}      | ${r.adherence !== null ? r.adherence : '—'}        | ${r.isActual ? 'ACTUAL' : 'FCST'} | ${r.status.replace('_',' ').toUpperCase()} |\n`;
    });
  });
  return md;
}

function buildUserMessage(phrase, data, trc, dateStr, timeStr, botId) {
  const actualsCount = Object.values(data)[0]?.filter(r => r.isActual).length || 0;
  const todayDate = new Date();
  let context = '';
  if      (botId === 'shortrange')   context = generateWeeklyContext(trc, todayDate);
  else if (botId === 'longrange')    context = generateLongRangeContext(todayDate);
  else if (botId === 'intelligence') context = generateIntelContext(data, trc, todayDate);
  else                               context = dataToMarkdownTable(data, trc);

  const queueDims = Object.entries(QUEUE_CFG).map(([q, cfg]) =>
    `${q}: critFloor=${cfg.critFloor}, surplusCeil=${cfg.surplusCeil}, baseAHT=${cfg.baseAHT}s`
  ).join(' | ');

  return `Trigger: ${phrase}
Date: ${dateStr}
Time: ${timeStr}
TRC Selection: ${trc}
Actuals intervals loaded: ${actualsCount} of 28

QUEUE DIMENSION TABLE:
${queueDims}
window_flag_threshold=2 | spike_threshold=-2.0 | volume_variance_flag=15% | aht_variance_flag=10%

SYNTHETIC DATA CONTEXT (substitutes for SharePoint knowledge source):
${context}

---
Note: This is a prototype running on Claude. Data is synthetic and seeded by date. Bot prompts are production-identical.`;
}

// CLAUDE API (via Vercel proxy — no CORS, no key in browser)
// ─────────────────────────────────────────────────────────────────────────────
async function callClaude(systemPrompt, userMessage) {
  const resp = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 2048,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }],
    }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }
  const json = await resp.json();
  return json.content[0].text;
}

function generateEmployees(config) {
  const rng = makeRng(42);
  const employees = [];
  let n = 1;
  const activeTRCs = Object.entries(config.trcs).filter(([,t]) => t.active).map(([id]) => id);
  const activeWSs  = Object.entries(config.workstreams).filter(([,w]) => w.active).map(([id]) => id);
  activeTRCs.forEach(trc => {
    activeWSs.forEach(ws => {
      const count = config.headcount[trc]?.[ws] || 0;
      const roles = ROLES_MAP[ws] || ['Associate','Specialist','Senior Specialist'];
      for (let i = 0; i < count; i++) {
        const r = rng();
        const roleIdx = r < 0.10 ? 0 : r < 0.75 ? 1 : 2;
        const role = roles[roleIdx];
        const seniority = roleIdx === 0 ? parseFloat((0.1 + rng() * 1.4).toFixed(1))
                        : roleIdx === 1 ? parseFloat((1.0 + rng() * 4.0).toFixed(1))
                        :                 parseFloat((3.0 + rng() * 7.0).toFixed(1));
        const today = new Date(2026, 3, 5);
        const hireDate = new Date(today);
        hireDate.setFullYear(today.getFullYear() - Math.floor(seniority));
        hireDate.setMonth(Math.floor(rng() * 12));
        hireDate.setDate(Math.floor(rng() * 28) + 1);
        const hireDateStr = hireDate.toISOString().split('T')[0];
        const fn = FIRST_NAMES[Math.floor(rng() * FIRST_NAMES.length)];
        const ln = LAST_NAMES[Math.floor(rng() * LAST_NAMES.length)];
        employees.push({
          empId: `EMP${String(n).padStart(3,'0')}`,
          name: `${fn.charAt(0)}. ${ln}`, firstName: fn, lastName: ln,
          trc, workstream: ws, role, seniorityYears: seniority,
          hireDate: hireDateStr, status: 'Active',
        });
        n++;
      }
    });
  });
  return employees;
}

function generateSkills(employees, config) {
  const rng = makeRng(1337);
  const activeTRCs = Object.entries(config.trcs).filter(([,t]) => t.active).map(([id]) => id);
  const activeWSs  = Object.entries(config.workstreams).filter(([,w]) => w.active).map(([id]) => id);
  return employees.map(emp => {
    const skills = [];
    activeTRCs.forEach(trc => {
      activeWSs.forEach(ws => {
        const queues = config.queueTemplates[ws] || [];
        const compliance = getComplianceStatus(emp.workstream, ws);
        queues.forEach(q => {
          const queueId = `${trc}_${q.id}`;
          const ownTRC = trc === emp.trc;
          const ownWS  = ws  === emp.workstream;
          if (ownTRC && ownWS) {
            skills.push({ queueId, eligible: true, proficiency: 'Primary', certDate: emp.hireDate });
          } else if (!ownTRC && ownWS) {
            if (emp.seniorityYears >= 3 && rng() < 0.25) {
              const [y,m,d] = emp.hireDate.split('-').map(Number);
              const cert = new Date(y, m+5, d).toISOString().split('T')[0];
              skills.push({ queueId, eligible: true, proficiency: 'Secondary', certDate: cert });
            } else { rng(); }
          } else if (!ownWS && compliance.status === 'allowed') {
            if (emp.seniorityYears >= 2 && rng() < 0.30) {
              const [y,m,d] = emp.hireDate.split('-').map(Number);
              const cert = new Date(y, m+8, d).toISOString().split('T')[0];
              skills.push({ queueId, eligible: true, proficiency: 'Secondary', certDate: cert });
            } else { rng(); }
          }
        });
      });
    });
    return { empId: emp.empId, skills };
  });
}

function generateSchedules(employees, skills) {
  const templateKeys = Object.keys(SHIFT_TEMPLATES);
  // Build per-(trc,workstream) index counters for round-robin queue assignment
  const wsEmpCounters = {};
  return employees.map(emp => {
    const isTrainee = emp.role.toLowerCase().startsWith('trainee');
    const isSenior  = emp.role.toLowerCase().startsWith('sr.');
    // Stagger shift templates: cycle through all templates based on a per-WS counter
    const wsKey = `${emp.trc}_${emp.workstream}`;
    wsEmpCounters[wsKey] = (wsEmpCounters[wsKey] || 0);
    const tIdx = wsEmpCounters[wsKey] % templateKeys.length;
    wsEmpCounters[wsKey]++;
    const templateKey  = templateKeys[tIdx];
    const template     = SHIFT_TEMPLATES[templateKey];
    const empSkillRec  = skills.find(s => s.empId === emp.empId);
    // Round-robin: distribute agents across their own TRC queues so each queue gets even coverage
    const ownTRCSkills = (empSkillRec?.skills||[]).filter(s => s.proficiency==='Primary' && s.queueId.startsWith(emp.trc+'_'));
    const empIdxInWS   = wsEmpCounters[wsKey] - 1; // already incremented above
    const primaryQueue = ownTRCSkills.length>0 ? ownTRCSkills[empIdxInWS % ownTRCSkills.length].queueId : '';
    const [sh, sm] = template.start.split(':').map(Number);
    const [eh, em] = template.end.split(':').map(Number);
    const shiftMins = (eh * 60 + em) - (sh * 60 + sm);
    const breaks = shiftMins >= 480 ? [
      { start: addMins(template.start, Math.round(shiftMins * 0.25)), duration: 15, type: 'Break' },
      { start: addMins(template.start, Math.round(shiftMins * 0.50)), duration: 30, type: 'Lunch' },
      { start: addMins(template.start, Math.round(shiftMins * 0.75)), duration: 15, type: 'Break' },
    ] : [];
    const breakMins = breaks.reduce((s, b) => s + b.duration, 0);
    return {
      empId: emp.empId, shiftTemplate: templateKey,
      shiftStart: template.start, shiftEnd: template.end,
      shiftHours: parseFloat((shiftMins / 60).toFixed(1)),
      workHours:  parseFloat(((shiftMins - breakMins) / 60).toFixed(1)),
      daysOn: ['Mon','Tue','Wed','Thu','Fri'], daysOff: ['Sat','Sun'],
      breaks, primaryQueue,
    };
  });
}

function buildQueueList(config) {
  const queues = [];
  Object.entries(config.trcs).filter(([,t])=>t.active).forEach(([trc])=>{
    Object.entries(config.workstreams).filter(([,w])=>w.active).forEach(([ws])=>{
      (config.queueTemplates[ws]||[]).forEach(q=>{
        const ch = q.channel||'Offline';
        const thr = config.thresholds[ch]||config.thresholds.Offline;
        queues.push({
          queueId:`${trc}_${q.id}`, trc, workstream:ws,
          label:q.label||q.id, priority:q.priority||2,
          channel:ch, thresholds:{...thr}, templateId:q.id,
        });
      });
    });
  });
  return queues;
}

function generateAgentSchedules(employees, baseSchedules, scenarioParams, startDate, days=14) {
  const rng = makeRng(Math.abs(startDate.getTime()%2147483647)||1);
  const result = [];
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(let d=0; d<days; d++){
    const dt = new Date(startDate); dt.setDate(dt.getDate()+d);
    const dateStr = dt.toISOString().split('T')[0];
    const dayLabel = DOW[dt.getDay()];
    employees.forEach(emp=>{
      const sched = baseSchedules.find(s=>s.empId===emp.empId);
      if(!sched || !sched.daysOn.includes(dayLabel)) return;
      let status = 'Active';
      const r = rng();
      if(r < scenarioParams.calloutRate) status = 'CallOut';
      else if(r < scenarioParams.calloutRate + scenarioParams.vtoRate) status = 'VTO';
      result.push({
        empId:emp.empId, trc:emp.trc, workstream:emp.workstream,
        date:dateStr, shiftStart:sched.shiftStart, shiftEnd:sched.shiftEnd,
        shiftHours:sched.shiftHours, workHours:sched.workHours, status, primaryQueue:sched.primaryQueue,
        breaks: sched.breaks||[],
      });
    });
  }
  return result;
}

function generateIntervals(agentSchedules, queueList, scenarioParams, startDate, days=14) {
  const SLOT_START_MIN = 7*60; // 07:00
  const SLOTS = 24;            // 24 x 30min = 12 hours

  // Group agent schedules by date_trc_ws for fast lookup
  const byDTW = {};
  agentSchedules.forEach(as=>{
    const k = `${as.date}_${as.trc}_${as.workstream}`;
    (byDTW[k]=byDTW[k]||[]).push(as);
  });

  const result = [];
  for(let d=0; d<days; d++){
    const dt = new Date(startDate); dt.setDate(dt.getDate()+d);
    const dow = dt.getDay();
    if(dow===0||dow===6) continue; // skip weekends — no staff scheduled
    const dateStr = dt.toISOString().split('T')[0];

    queueList.forEach(q=>{
      const wsBase  = WS_BASE[q.workstream]||{baseVol:8,baseAHT:360};
      const wsScheds = byDTW[`${dateStr}_${q.trc}_${q.workstream}`]||[];
      const qCountInWS = queueList.filter(qq=>qq.trc===q.trc&&qq.workstream===q.workstream).length||1;
      const slots = [];

      for(let s=0; s<SLOTS; s++){
        const slotMin  = SLOT_START_MIN + s*30;
        const slotEnd  = slotMin + 30;
        const timeStr  = `${String(Math.floor(slotMin/60)).padStart(2,'0')}:${String(slotMin%60).padStart(2,'0')}`;
        const curve    = TIME_CURVE[s]||1.0;
        const slotRng  = makeRng(dt.getTime()%2147483647 + s*997 + q.queueId.charCodeAt(0)*7919 + q.queueId.charCodeAt(q.queueId.length-1)*997);

        // Scheduled FTE: count agents assigned to THIS specific queue (by primaryQueue)
        // Agents with no primaryQueue are split evenly as unassigned overflow
        let scheduledFTE = 0;
        let unassignedFTE = 0;
        wsScheds.forEach(as=>{
          if(as.status==='CallOut'||as.status==='VTO') return;
          const [sh,sm] = as.shiftStart.split(':').map(Number);
          const [eh,em] = as.shiftEnd.split(':').map(Number);
          if(slotMin>=sh*60+sm && slotEnd<=eh*60+em){
            if(as.primaryQueue===q.queueId) scheduledFTE += 1;
            else if(!as.primaryQueue) unassignedFTE += 1;
          }
        });
        // Spread unassigned agents evenly; round to 1 decimal
        scheduledFTE += unassignedFTE / qCountInWS;
        scheduledFTE = Math.round(scheduledFTE*10)/10;

        // Actual FTE = scheduled * adherence
        const adh = Math.max(0.74, Math.min(1.0, scenarioParams.adherenceBase+(slotRng()-0.5)*0.06));
        const actualFTE = Math.round(scheduledFTE*adh*10)/10;

        // Per-queue volume: each queue handles full workstream demand independently.
        // Scenario volumeModifier scales demand — this is the pressure lever.
        const vol = Math.max(1, Math.round(wsBase.baseVol * curve * scenarioParams.volumeModifier * (0.88+slotRng()*0.24)));
        const aht = Math.round(wsBase.baseAHT*(0.88+slotRng()*0.24));

        // Required FTE: pure Erlang-C — demand only, fully independent of supply.
        // Headcount sized to baseline meets this at peak; scenarios push it into deficit.
        const requiredFTE = parseFloat(Math.max(0.5, vol * aht / 1800).toFixed(1));

        const net = parseFloat((actualFTE-requiredFTE).toFixed(1));
        const thr = q.thresholds;
        let status;
        if(net<=(thr.escalate||-3))                       status='critical';
        else if(net<0 && net>(thr.escalate||-3))          status='at_risk';
        else if(net===0)                                   status='threshold';
        else if(net>0&&net<=(thr.surplus||2))              status='adequate';
        else                                               status='surplus';

        const isPeak = (slotMin>=8*60&&slotMin<12*60)||(slotMin>=13*60&&slotMin<17*60);
        slots.push({ slotIdx:s, time:timeStr, scheduledFTE, actualFTE, requiredFTE,
                     netStaffing:net, volume:vol, aht,
                     adherencePct:parseFloat((adh*100).toFixed(1)),
                     status, timeBucket:isPeak?'PEAK':'OFFPEAK' });
      }
      result.push({ date:dateStr, queueId:q.queueId, trc:q.trc, workstream:q.workstream,
                    label:q.label, priority:q.priority, channel:q.channel,
                    thresholds:q.thresholds, slots });
    });
  }
  return result;
}

function generateRiskWindows(intervals) {
  const windows = [];
  intervals.forEach(iv=>{
    let run = [];
    const flush = () => {
      if(run.length>=2){
        const nets = run.map(s=>s.netStaffing);
        const netAvg = parseFloat((nets.reduce((a,b)=>a+b,0)/nets.length).toFixed(2));
        const worst  = Math.min(...nets);
        const hasCrit= run.some(s=>s.status==='critical');
        const pkPct  = run.filter(s=>s.timeBucket==='PEAK').length/run.length;
        windows.push({
          queueId:iv.queueId, trc:iv.trc, workstream:iv.workstream,
          label:iv.label, date:iv.date, priority:iv.priority,
          start:run[0].time, end:run[run.length-1].time,
          durationMins:run.length*30, intervalCount:run.length,
          netAvg, worst, hasCritical:hasCrit,
          timeBucket:pkPct>0.5?'PEAK':'OFFPEAK',
          severityScore:parseFloat((Math.abs(netAvg)*(pkPct>0.5?1.5:1.0)*(hasCrit?1.3:1.0)*(iv.priority||2)).toFixed(2)),
        });
      }
      run=[];
    };
    iv.slots.forEach(s=>{
      if(s.status==='critical'||s.status==='at_risk') run.push(s);
      else flush();
    });
    flush();
  });
  windows.sort((a,b)=>b.severityScore-a.severityScore);
  return windows.slice(0,30);
}

function generateDailyHistory(queueList, scenarioParams, endDate, weeks=13) {
  const result = [];
  const days = weeks*7;
  for(let d=days-1; d>=0; d--){
    const dt = new Date(endDate); dt.setDate(dt.getDate()-d);
    if(dt.getDay()===0||dt.getDay()===6) continue;
    const dateStr = dt.toISOString().split('T')[0];
    const dayRng  = makeRng(dt.getTime()%2147483647);
    queueList.forEach(q=>{
      const wb = WS_BASE[q.workstream]||{baseVol:8,baseAHT:360};
      const fcstVol = Math.round(wb.baseVol*24*scenarioParams.volumeModifier*(0.88+dayRng()*0.24));
      const varPct  = parseFloat(((dayRng()-0.5)*0.22).toFixed(3));
      const actVol  = Math.round(fcstVol*(1+varPct));
      const fcstFTE = Math.round(fcstVol*wb.baseAHT/(7.5*3600)*1.1);
      const actFTE  = Math.round(fcstFTE*(scenarioParams.adherenceBase+(dayRng()-0.5)*0.06));
      const sl      = parseFloat((Math.max(58,Math.min(99,82+(dayRng()-0.5)*20))).toFixed(1));
      const adh     = parseFloat((Math.max(75,Math.min(99,scenarioParams.adherenceBase*100+(dayRng()-0.5)*8))).toFixed(1));
      result.push({
        date:dateStr, queueId:q.queueId, trc:q.trc, workstream:q.workstream, label:q.label,
        forecastedVolume:fcstVol, actualVolume:actVol,
        variancePct:parseFloat((varPct*100).toFixed(1)),
        forecastedFTE:fcstFTE, actualFTE:actFTE, sl, adherence:adh, driverFlags:[],
      });
    });
  }
  return result;
}

function aggregateWeeklyHistory(dailyHistory) {
  const wkMap = {};
  dailyHistory.forEach(d=>{
    const dt = new Date(d.date);
    const mon = new Date(dt); mon.setDate(dt.getDate()-(dt.getDay()||7)+1);
    const wk = mon.toISOString().split('T')[0];
    const key = `${wk}_${d.queueId}`;
    if(!wkMap[key]) wkMap[key]={week:wk, queueId:d.queueId, trc:d.trc, workstream:d.workstream, label:d.label, days:[]};
    wkMap[key].days.push(d);
  });
  return Object.values(wkMap).map(w=>{
    const ds=w.days; const n=ds.length||1;
    return {
      week:w.week, queueId:w.queueId, trc:w.trc, workstream:w.workstream, label:w.label,
      forecastedVolume:Math.round(ds.reduce((s,d)=>s+d.forecastedVolume,0)),
      actualVolume:Math.round(ds.reduce((s,d)=>s+d.actualVolume,0)),
      variancePct:parseFloat((ds.reduce((s,d)=>s+d.variancePct,0)/n).toFixed(1)),
      forecastedFTE:Math.round(ds.reduce((s,d)=>s+d.forecastedFTE,0)/n),
      actualFTE:Math.round(ds.reduce((s,d)=>s+d.actualFTE,0)/n),
      sl:parseFloat((ds.reduce((s,d)=>s+d.sl,0)/n).toFixed(1)),
      adherence:parseFloat((ds.reduce((s,d)=>s+d.adherence,0)/n).toFixed(1)),
    };
  }).sort((a,b)=>a.week.localeCompare(b.week));
}

function generateWeeklyForecast(weeklyHistory, scenarioParams) {
  const result = [];
  const qIds = [...new Set(weeklyHistory.map(w=>w.queueId))];
  qIds.forEach(qid=>{
    const qHist = weeklyHistory.filter(w=>w.queueId===qid);
    if(!qHist.length) return;
    const last = qHist[qHist.length-1];
    const recent = qHist.slice(-6);
    const avgVol = recent.reduce((s,w)=>s+w.actualVolume,0)/recent.length;
    const avgVar = recent.reduce((s,w)=>s+w.variancePct,0)/recent.length;
    for(let fw=1; fw<=4; fw++){
      const wkDt = new Date(last.week); wkDt.setDate(wkDt.getDate()+fw*7);
      result.push({
        week:wkDt.toISOString().split('T')[0],
        queueId:qid, trc:last.trc, workstream:last.workstream, label:last.label,
        forecastedVolume:Math.round(avgVol*scenarioParams.volumeModifier*(1+avgVar/100)),
        confidence:parseFloat(Math.max(0.62,0.90-fw*0.07).toFixed(2)),
        trendDirection:avgVar>5?'Rising':avgVar<-5?'Falling':'Flat',
      });
    }
  });
  return result;
}

function generateTRCAggregates(intervals, config) {
  const agg = {};
  intervals.forEach(iv=>{
    const key=`${iv.trc}_${iv.workstream}`;
    if(!agg[key]) agg[key]={trc:iv.trc,workstream:iv.workstream,netSum:0,count:0,surplusCount:0,deficitCount:0,criticalCount:0};
    iv.slots.forEach(s=>{
      agg[key].netSum+=s.netStaffing; agg[key].count++;
      if(s.status==='surplus') agg[key].surplusCount++;
      if(s.status==='at_risk'||s.status==='threshold') agg[key].deficitCount++;
      if(s.status==='critical') agg[key].criticalCount++;
    });
  });
  Object.values(agg).forEach(a=>{ a.netAvg=parseFloat((a.netSum/(a.count||1)).toFixed(2)); });
  return agg;
}

function calculateScheduleScore(agentSchedules, queueList) {
  let score = 100;
  const penalties = [];
  const total = agentSchedules.length;
  const callouts = agentSchedules.filter(a=>a.status==='CallOut').length;
  const cotPct = callouts/Math.max(total,1);
  if(cotPct>0.10){ score-=15; penalties.push({type:'High Callout',impact:-15,detail:`${(cotPct*100).toFixed(1)}% call-out rate`}); }
  else if(cotPct>0.05){ score-=8; penalties.push({type:'Elevated Callout',impact:-8,detail:`${(cotPct*100).toFixed(1)}% call-out rate`}); }
  const vto = agentSchedules.filter(a=>a.status==='VTO').length;
  if(vto/Math.max(total,1)>0.06){ score-=5; penalties.push({type:'High VTO',impact:-5,detail:`${vto} agents on VTO`}); }
  return { score:Math.max(0,score), grade:score>=90?'A':score>=80?'B':score>=70?'C':score>=60?'D':'F',
           calloutPct:parseFloat((cotPct*100).toFixed(1)), penalties };
}

// ─────────────────────────────────────────────────────────────────────────────
// STEP 10 — EVENT OVERLAY ENGINE
// Applies injected intraday events as non-destructive overlays on generatedData.
// Returns a new effectiveData object — generatedData is never mutated.
// ─────────────────────────────────────────────────────────────────────────────
function recomputeRiskWindows(intervals) {
  const windows = [];
  intervals.forEach(iv => {
    const slots = iv.slots||[];
    let run = [];
    const flush = () => {
      if(run.length >= 2) {
        const nets = run.map(s=>s.netStaffing);
        const netAvg = parseFloat((nets.reduce((a,b)=>a+b,0)/nets.length).toFixed(1));
        windows.push({
          queueId:iv.queueId, trc:iv.trc, workstream:iv.workstream, date:iv.date,
          start:run[0].time, end:run[run.length-1].time,
          durationMins:run.length*30, netAvg, hasCritical:nets.some(n=>n<-3),
          timeBucket:run[0].time<'10:00'?'PEAK':run[0].time<'14:00'?'MID':'EOD',
        });
      }
      run=[];
    };
    slots.forEach(s=>{ if(s.netStaffing<0) run.push(s); else flush(); });
    flush();
  });
  return windows.sort((a,b)=>(b.hasCritical?1:0)-(a.hasCritical?1:0)||(a.netAvg-b.netAvg));
}

function applyEventOverlay(generatedData, injectedEvents, simTimeSlot) {
  if(!generatedData || !injectedEvents?.length) return generatedData;

  // Work on shallow copies — only mutate what changes
  let agentSchedules = [...(generatedData.agentSchedules||[])];
  let intervals = (generatedData.intervals||[]).map(iv=>({
    ...iv, slots:[...(iv.slots||[]).map(s=>({...s}))]
  }));

  const today = new Date().toISOString().split('T')[0];
  // "Now" = sim time override or real time string like "10:30"
  const nowTime = (simTimeSlot && simTimeSlot!=='Live')
    ? simTimeSlot
    : new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}).slice(0,5);

  injectedEvents.forEach((ev, evIdx) => {
    const trcOk = a => ev.trc==='ALL'||a.trc===ev.trc||!ev.trc;

    if(ev.type==='Callout' || ev.type==='VTO') {
      const newStatus = ev.type==='Callout' ? 'CallOut' : 'VTO';
      // Deterministic: sort active agents by empId, then take a window based on evIdx
      const pool = agentSchedules
        .filter(a=>a.status==='Active' && trcOk(a) && a.date===today)
        .sort((a,b)=>a.empId.localeCompare(b.empId));
      const offset = evIdx * (ev.count||2);
      const targets = new Set(pool.slice(offset, offset+(ev.count||2)).map(a=>`${a.empId}|${a.date}`));
      agentSchedules = agentSchedules.map(a=>
        targets.has(`${a.empId}|${a.date}`) ? {...a, status:newStatus, _injected:ev.type} : a
      );
    }

    if(ev.type==='VolumeSurge') {
      intervals = intervals.map(iv=>{
        if(!trcOk(iv)) return iv;
        return { ...iv, slots: iv.slots.map(s=>{
          if(s.time < nowTime) return s; // only affect future/current slots
          const newReq = parseFloat((s.requiredFTE*(1+(ev.magnitude||0.20))).toFixed(1));
          const newNet = parseFloat((s.actualFTE - newReq).toFixed(1));
          const status = newNet<-3?'critical':newNet<0?'at_risk':newNet>3?'surplus':'adequate';
          return {...s, requiredFTE:newReq, netStaffing:newNet, status, _injected:'VolumeSurge'};
        })};
      });
    }

    if(ev.type==='SystemOutage') {
      const outageEnd = (() => {
        const [h,m] = nowTime.split(':').map(Number);
        const endMin = h*60+m + (ev.durationSlots||4)*30;
        return `${String(Math.floor(endMin/60)).padStart(2,'0')}:${String(endMin%60).padStart(2,'0')}`;
      })();
      intervals = intervals.map(iv=>{
        if(!trcOk(iv)) return iv;
        return { ...iv, slots: iv.slots.map(s=>{
          if(s.time < nowTime || s.time > outageEnd) return s;
          const newAct = parseFloat((s.actualFTE*(1-(ev.magnitude||0.18))).toFixed(1));
          const newNet = parseFloat((newAct - s.requiredFTE).toFixed(1));
          const status = newNet<-3?'critical':newNet<0?'at_risk':newNet>3?'surplus':'adequate';
          return {...s, actualFTE:newAct, netStaffing:newNet, status, _injected:'SystemOutage'};
        })};
      });
    }
  });

  // Recompute risk windows from modified intervals
  const riskWindows = recomputeRiskWindows(intervals);

  return {...generatedData, agentSchedules, intervals, riskWindows};
}

function assembleDataPacket(generatedData, trc, simDate, simTime, botRunHistory=[]) {
  const { riskWindows=[], trcAggregates={}, weeklyHistory=[], weeklyForecast=[],
          agentSchedules=[], intervals=[], scheduleScore={}, queueList=[] } = generatedData||{};
  const tF = arr=>trc==='ALL'?arr:arr.filter(x=>x.trc===trc);
  const todayWins = tF(riskWindows.filter(w=>w.date===simDate)).slice(0,10);
  const trcAgg = Object.fromEntries(Object.entries(trcAggregates).filter(([k])=>trc==='ALL'||k.startsWith(trc)));
  const surplusWS = Object.values(trcAggregates).filter(a=>(trc==='ALL'||a.trc===trc)&&a.netAvg>1.5).map(a=>a.workstream);
  const deficitWS = Object.values(trcAggregates).filter(a=>(trc==='ALL'||a.trc===trc)&&a.netAvg<-0.5).map(a=>a.workstream);
  const crossSkillOpps = [];
  surplusWS.forEach(sWS=>{ deficitWS.forEach(dWS=>{ const c=getComplianceStatus(sWS,dWS); if(c.status==='allowed') crossSkillOpps.push({from:sWS,to:dWS,compliance:c.label,candidateCount:tF(agentSchedules).filter(a=>a.workstream===sWS&&a.status==='Active').length}); }); });
  const recentWeekly = tF(weeklyHistory).slice(-4);
  return {
    simDate, simTime, trc,
    summary:{
      queues:tF(queueList).length,
      agentsActive:tF(agentSchedules).filter(a=>a.status==='Active').length,
      agentsCallOut:tF(agentSchedules).filter(a=>a.status==='CallOut').length,
      agentsVTO:tF(agentSchedules).filter(a=>a.status==='VTO').length,
      riskWindowCount:todayWins.length,
      criticalWindowCount:todayWins.filter(w=>w.hasCritical).length,
    },
    riskWindows:todayWins,
    trcAggregates:trcAgg,
    crossSkillOpps:crossSkillOpps.slice(0,5),
    weeklyData:{recentWeekly},
    weeklyHistory:tF(weeklyHistory).slice(-13),
    weeklyForecast:tF(weeklyForecast).slice(0,4),
    scheduleScore,
    intelligenceContext:{
      postMortems:botRunHistory.filter(r=>r.bot==='intraday').slice(-5).map(r=>r.summary),
      weeklySummaries:botRunHistory.filter(r=>r.bot==='shortrange').slice(-2).map(r=>r.summary),
      openEscalations:todayWins.filter(w=>w.hasCritical).length,
      trendDirection:recentWeekly.length>0?(recentWeekly[recentWeekly.length-1].variancePct>5?'Rising':recentWeekly[recentWeekly.length-1].variancePct<-5?'Falling':'Flat'):'Flat',
    },
  };
}
