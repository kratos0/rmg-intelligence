function assembleIntradayPacket(generatedData, trc, simDate, simTime, botRunHistory=[]) {
  const { agentSchedules=[], intervals=[], riskWindows=[], scheduleScore={}, queueList=[] } = generatedData||{};
  const tF = arr => trc==='ALL' ? arr : arr.filter(x=>x.trc===trc);

  // Today's intervals for this TRC
  const todayIVs = tF(intervals.filter(iv=>iv.date===simDate));

  // Build slot aggregate table across all queues
  const slotMap = {};
  todayIVs.forEach(iv=>(iv.slots||[]).forEach(s=>{
    if(!slotMap[s.time]) slotMap[s.time]={sch:0,act:0,req:0,net:0,vol:0,cnt:0};
    slotMap[s.time].sch += s.scheduledFTE||0;
    slotMap[s.time].act += s.actualFTE||0;
    slotMap[s.time].req += s.requiredFTE||0;
    slotMap[s.time].net += s.netStaffing||0;
    slotMap[s.time].vol += s.volume||0;
    slotMap[s.time].cnt++;
  }));
  const sortedSlots = Object.entries(slotMap).sort(([a],[b])=>a.localeCompare(b));

  const rpad = (v,n) => String(v).padEnd(n);
  const lpad = (v,n) => String(v).padStart(n);
  const fNet = n => (n>=0?'+':'')+Math.round(n*10)/10;
  const fFTE = n => (Math.round(n*10)/10).toFixed(1);

  // Format staffing table
  let staffTable = `${'Time '.padEnd(6)}| ${'Sched'.padEnd(6)}| ${'Act'.padEnd(6)}| ${'Req'.padEnd(6)}| ${'Net'.padEnd(6)}| ${'Vol'.padEnd(5)}| Status\n`;
  staffTable += '-'.repeat(55)+'\n';
  sortedSlots.forEach(([time,v])=>{
    const status = v.net<-3?'CRITICAL':v.net<0?'at_risk':v.net>3?'surplus':'adequate';
    staffTable += `${time.padEnd(6)}| ${fFTE(v.sch).padEnd(6)}| ${fFTE(v.act).padEnd(6)}| ${fFTE(v.req).padEnd(6)}| ${fNet(v.net).padEnd(6)}| ${String(Math.round(v.vol)).padEnd(5)}| ${status}\n`;
  });

  // Risk windows (today, TRC-filtered)
  const todayRisks = tF(riskWindows.filter(w=>w.date===simDate)).sort((a,b)=>
    (b.hasCritical?1:0)-(a.hasCritical?1:0)||(a.netAvg-b.netAvg)).slice(0,10);
  let riskBlock = todayRisks.length===0 ? 'None identified.\n' :
    todayRisks.map((w,i)=>`${i+1}. ${w.queueId.padEnd(28)} | ${w.start}–${w.end} | Avg Net: ${fNet(w.netAvg)} | ${w.durationMins}m | ${w.hasCritical?'❗ CRITICAL':w.timeBucket==='PEAK'?'⚠ PEAK':'ℹ INFO'}`).join('\n')+'\n';

  // Cross-skill opportunities
  const { trcAggregates={} } = generatedData;
  const surplusWS = Object.values(trcAggregates).filter(a=>(trc==='ALL'||a.trc===trc)&&a.netAvg>1.5).map(a=>a.workstream);
  const deficitWS = Object.values(trcAggregates).filter(a=>(trc==='ALL'||a.trc===trc)&&a.netAvg<-0.5).map(a=>a.workstream);
  const crossSkill = [];
  surplusWS.forEach(sWS=>deficitWS.forEach(dWS=>{
    const c=getComplianceStatus(sWS,dWS);
    const candidates=tF(agentSchedules).filter(a=>a.workstream===sWS&&a.status==='Active').length;
    crossSkill.push(`${c.status==='allowed'?'✓':'✗'} ${sWS} → ${dWS} | ${candidates} candidates | ${c.label}`);
  }));
  const crossBlock = crossSkill.length ? crossSkill.join('\n')+'\n' : 'No cross-skill moves identified.\n';

  // Agent summary
  const todayAgents = tF(agentSchedules.filter(a=>a.date===simDate));
  const active  = todayAgents.filter(a=>a.status==='Active').length;
  const callout = todayAgents.filter(a=>a.status==='CallOut').length;
  const vto     = todayAgents.filter(a=>a.status==='VTO').length;
  const score   = scheduleScore;

  // Bot history summary
  const histBlock = botRunHistory.filter(r=>r&&r.bot==='intraday').slice(-3)
    .map(r=>`[${r.trc||'?'}] ${r.trigger||'?'} — ${r.summary?.riskCount||0} risks, top: ${r.summary?.topQueue||'—'}`)
    .join('\n') || 'No prior runs this session.';

  return `=== INTRADAY DATA PACKET v2.2 ===
Date: ${simDate} | Time: ${simTime} | TRC: ${trc} | Scenario: ${generatedData.scenario||'Baseline'}${generatedData.driverEvent&&generatedData.driverEvent!=='None'?' / '+generatedData.driverEvent:''}

STAFFING POSITION — TODAY (30-min intervals, all queues aggregated):
${staffTable}
RISK WINDOWS (pre-ranked by severity):
${riskBlock}
CROSS-SKILL OPPORTUNITIES:
${crossBlock}
AGENT SUMMARY:
Active: ${active} | Call-Out: ${callout} | VTO: ${vto} | Queues: ${tF(queueList).length}
Score: ${score.score||'—'}/${score.grade||'—'} | Worst Queue: ${todayRisks[0]?.queueId||'None'}

BOT RUN HISTORY (last 3):
${histBlock}`;
}

function assembleShortRangePacket(generatedData, trc, simDate, simTime, botRunHistory=[]) {
  const { agentSchedules=[], weeklyHistory=[], weeklyForecast=[], scheduleScore={}, intervals=[] } = generatedData||{};
  const tF = arr => trc==='ALL' ? arr : arr.filter(x=>x.trc===trc);

  // 7-day window centered on simDate
  const pivot = new Date(simDate);
  const days = Array.from({length:7},(_,i)=>{
    const d=new Date(pivot); d.setDate(pivot.getDate()+i-3);
    return d.toISOString().split('T')[0];
  });

  let coverTable = `${'Date'.padEnd(12)}| Active | CO | VTO | Total | Net Avg\n${'-'.repeat(52)}\n`;
  days.forEach(date=>{
    const ds = tF(agentSchedules.filter(a=>a.date===date));
    const ivs= tF(intervals.filter(iv=>iv.date===date));
    let netS=0,netC=0;
    ivs.forEach(iv=>(iv.slots||[]).forEach(s=>{netS+=s.netStaffing||0;netC++;}));
    const netAvg = netC>0?((netS/netC)>=0?'+':'')+Math.round(netS/netC*10)/10:'—';
    const isToday = date===simDate;
    coverTable += `${(date.slice(5)+(isToday?' ★':'')).padEnd(12)}| ${String(ds.filter(a=>a.status==='Active').length).padEnd(7)}| ${String(ds.filter(a=>a.status==='CallOut').length).padEnd(3)}| ${String(ds.filter(a=>a.status==='VTO').length).padEnd(4)}| ${String(ds.length).padEnd(6)}| ${netAvg}\n`;
  });

  // 6-week history
  const byWk={};
  tF(weeklyHistory).forEach(w=>{
    if(!byWk[w.week]) byWk[w.week]={week:w.week,vol:0,sl:0,adh:0,cnt:0};
    byWk[w.week].vol+=w.actualVolume||0; byWk[w.week].sl+=w.sl||0;
    byWk[w.week].adh+=w.adherence||0; byWk[w.week].cnt++;
  });
  const recentWks = Object.values(byWk).sort((a,b)=>a.week.localeCompare(b.week)).slice(-6);
  let histTable = `${'Week'.padEnd(12)}| Act Vol | SL%  | Adh%\n${'-'.repeat(38)}\n`;
  recentWks.forEach(w=>{ histTable += `${w.week.slice(5).padEnd(12)}| ${String(Math.round(w.vol)).padEnd(8)}| ${w.cnt>0?Math.round(w.sl/w.cnt):'-'}%   | ${w.cnt>0?Math.round(w.adh/w.cnt):'-'}%\n`; });

  // 4-week forecast
  const byWkF={};
  tF(weeklyForecast).forEach(w=>{
    if(!byWkF[w.week]) byWkF[w.week]={week:w.week,vol:0,conf:0,trend:w.trendDirection,cnt:0};
    byWkF[w.week].vol+=w.forecastedVolume||0; byWkF[w.week].conf+=w.confidence||0; byWkF[w.week].cnt++;
  });
  const fcastWks = Object.values(byWkF).sort((a,b)=>a.week.localeCompare(b.week)).slice(0,4);
  let fcastTable = `${'Week'.padEnd(12)}| Fcst Vol | Conf% | Trend\n${'-'.repeat(42)}\n`;
  fcastWks.forEach(w=>{ fcastTable += `${w.week.slice(5).padEnd(12)}| ${String(Math.round(w.vol)).padEnd(9)}| ${w.cnt>0?Math.round(w.conf/w.cnt*100):'-'}%   | ${w.trend||'Flat'}\n`; });

  const score=scheduleScore;
  return `=== SHORT RANGE DATA PACKET v1.2 ===
Date: ${simDate} | Time: ${simTime} | TRC: ${trc} | Scenario: ${generatedData.scenario||'Baseline'}

SCHEDULE SCORE: ${score.score||'—'}/100 · Grade ${score.grade||'—'}
${(score.penalties||[]).slice(0,3).map(p=>`⚠ ${typeof p==='object'?p.type+': '+p.detail:p}`).join('\n')||'No penalties.'}

7-DAY AGENT COVERAGE (★ = today):
${coverTable}
6-WEEK ACTUAL HISTORY:
${histTable}
4-WEEK FORECAST:
${fcastTable}`;
}

function assembleLongRangePacket(generatedData, trc, simDate, simTime) {
  const { weeklyHistory=[], weeklyForecast=[], scheduleScore={} } = generatedData||{};
  const tF = arr => trc==='ALL' ? arr : arr.filter(x=>x.trc===trc);

  const byWk={};
  tF(weeklyHistory).forEach(w=>{
    if(!byWk[w.week]) byWk[w.week]={week:w.week,vol:0,sl:0,adh:0,var:0,cnt:0};
    byWk[w.week].vol+=w.actualVolume||0; byWk[w.week].sl+=w.sl||0;
    byWk[w.week].adh+=w.adherence||0; byWk[w.week].var+=w.variancePct||0; byWk[w.week].cnt++;
  });
  const histWks = Object.values(byWk).sort((a,b)=>a.week.localeCompare(b.week));

  let histTable = `${'Week'.padEnd(12)}| Act Vol | SL%  | Adh% | Vol Var%\n${'-'.repeat(48)}\n`;
  histWks.forEach((w,i)=>{
    const prev = histWks[i-1];
    const trend = prev ? (w.vol>prev.vol*1.05?'↑':w.vol<prev.vol*0.95?'↓':'→') : '→';
    histTable += `${w.week.slice(5).padEnd(12)}| ${String(Math.round(w.vol)).padEnd(8)}| ${w.cnt>0?Math.round(w.sl/w.cnt):'-'}%   | ${w.cnt>0?Math.round(w.adh/w.cnt):'-'}%   | ${w.cnt>0?(Math.round(w.var/w.cnt*10)/10):'-'}% ${trend}\n`;
  });

  const byWkF={};
  tF(weeklyForecast).forEach(w=>{
    if(!byWkF[w.week]) byWkF[w.week]={week:w.week,vol:0,conf:0,trend:w.trendDirection,cnt:0};
    byWkF[w.week].vol+=w.forecastedVolume||0; byWkF[w.week].conf+=w.confidence||0; byWkF[w.week].cnt++;
  });
  const fcastWks = Object.values(byWkF).sort((a,b)=>a.week.localeCompare(b.week));
  let fcastTable = `${'Week'.padEnd(12)}| Fcst Vol | Conf% | Trend\n${'-'.repeat(42)}\n`;
  fcastWks.forEach(w=>{ fcastTable += `${w.week.slice(5).padEnd(12)}| ${String(Math.round(w.vol)).padEnd(9)}| ${w.cnt>0?Math.round(w.conf/w.cnt*100):'-'}%   | ${w.trend||'Flat'}\n`; });

  const score=scheduleScore;
  return `=== LONG RANGE DATA PACKET v1.2 ===
Date: ${simDate} | Time: ${simTime} | TRC: ${trc} | Scenario: ${generatedData.scenario||'Baseline'}

SCHEDULE SCORE: ${score.score||'—'}/100 · Grade ${score.grade||'—'}

13-WEEK ACTUAL HISTORY:
${histTable}
4-WEEK FORECAST:
${fcastTable}`;
}

function assembleIntelligencePacket(generatedData, trc, simDate, simTime, botRunHistory=[]) {
  const { agentSchedules=[], intervals=[], riskWindows=[], trcAggregates={}, scheduleScore={} } = generatedData||{};

  // Cross-TRC snapshot
  const allTRCs = [...new Set(agentSchedules.map(a=>a.trc))].sort();
  let trcTable = `${'TRC'.padEnd(6)}| Active | CO | Risks | Net Avg | Trend\n${'-'.repeat(50)}\n`;
  allTRCs.forEach(t=>{
    const ds = agentSchedules.filter(a=>a.trc===t&&a.date===simDate);
    const rs = riskWindows.filter(w=>w.trc===t&&w.date===simDate);
    const ivs= intervals.filter(iv=>iv.trc===t&&iv.date===simDate);
    let netS=0,netC=0;
    ivs.forEach(iv=>(iv.slots||[]).forEach(s=>{netS+=s.netStaffing||0;netC++;}));
    const netAvg=netC>0?Math.round(netS/netC*10)/10:0;
    const agg = Object.values(trcAggregates).find(a=>a.trc===t);
    trcTable += `${t.padEnd(6)}| ${String(ds.filter(a=>a.status==='Active').length).padEnd(7)}| ${String(ds.filter(a=>a.status==='CallOut').length).padEnd(3)}| ${String(rs.length).padEnd(6)}| ${(netAvg>=0?'+':'')+netAvg.toFixed(1).padEnd(8)}| ${agg?.trend||'Flat'}\n`;
  });

  // Cross-skill pool
  const surplusWS = Object.values(trcAggregates).filter(a=>(trc==='ALL'||a.trc===trc)&&a.netAvg>1.5).map(a=>a.workstream);
  const deficitWS = Object.values(trcAggregates).filter(a=>(trc==='ALL'||a.trc===trc)&&a.netAvg<-0.5).map(a=>a.workstream);
  const crossSkill=[];
  surplusWS.forEach(sWS=>deficitWS.forEach(dWS=>{
    const c=getComplianceStatus(sWS,dWS);
    const pool = agentSchedules.filter(a=>a.workstream===sWS&&a.status==='Active'&&(trc==='ALL'||a.trc===trc)).length;
    crossSkill.push(`${c.status==='allowed'?'✓':'✗'} ${sWS.padEnd(16)} → ${dWS.padEnd(16)} | Pool: ${pool} | ${c.label}`);
  }));
  const crossBlock=crossSkill.join('\n')||'No cross-skill opportunities identified.';

  // Bot run history
  const histLines=botRunHistory.filter(r=>r).slice(-5)
    .map(r=>`[${r.bot||'?'}] ${r.trc||'?'} · "${r.trigger||'?'}" — ${r.summary?.riskCount||0} risks`)
    .join('\n')||'No prior runs.';

  const score=scheduleScore;
  return `=== INTELLIGENCE DATA PACKET v1.0 ===
Date: ${simDate} | Time: ${simTime} | TRC: ${trc} | Scenario: ${generatedData.scenario||'Baseline'}

CROSS-TRC SNAPSHOT — TODAY:
${trcTable}
CROSS-SKILL OPPORTUNITIES:
${crossBlock}

BOT RUN HISTORY (last 5):
${histLines}

SCHEDULE SCORE: ${score.score||'—'}/100 · Grade ${score.grade||'—'}`;
}

// ─── TRC BUILDER ─────────────────────────────────────────────────────────────
function TRCBuilder({ config, setConfig }) {
  const [editId, setEditId]       = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const [showAdd, setShowAdd]     = useState(false);
  const [newId, setNewId]         = useState('');
  const [newLabel, setNewLabel]   = useState('');

  const trcs = config.trcs;

  const handleAdd = () => {
    const id = newId.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (!id || !newLabel.trim() || trcs[id]) return;
    setConfig(prev => ({
      ...prev,
      trcs: { ...prev.trcs, [id]: { label: newLabel.trim(), active: true } },
      headcount: {
        ...prev.headcount,
        [id]: Object.fromEntries(Object.keys(prev.workstreams).map(ws => [ws, 0])),
      },
    }));
    setNewId(''); setNewLabel(''); setShowAdd(false);
  };

  const handleToggle = (id) => {
    setConfig(prev => ({
      ...prev,
      trcs: { ...prev.trcs, [id]: { ...prev.trcs[id], active: !prev.trcs[id].active } },
    }));
  };

  const handleSaveEdit = (id) => {
    if (!editLabel.trim()) return;
    setConfig(prev => ({
      ...prev,
      trcs: { ...prev.trcs, [id]: { ...prev.trcs[id], label: editLabel.trim() } },
    }));
    setEditId(null);
  };

  const handleDelete = (id) => {
    setConfig(prev => {
      const { [id]: _, ...trcsRest } = prev.trcs;
      const { [id]: __, ...hcRest  } = prev.headcount;
      return { ...prev, trcs: trcsRest, headcount: hcRest };
    });
  };

  const totalQueues = Object.values(config.queueTemplates).reduce((n, qt) => n + qt.length, 0);

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">TRCs — {Object.keys(trcs).length} configured</span>
        <button className="btn-primary" onClick={() => setShowAdd(!showAdd)}>+ Add TRC</button>
      </div>
      <table className="config-table">
        <thead>
          <tr>
            <th style={{width:80}}>ID</th>
            <th>Label</th>
            <th style={{width:90}}>Status</th>
            <th style={{width:120}}>Total Queues</th>
            <th style={{width:160}}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {Object.entries(trcs).map(([id, trc]) => (
            <tr key={id}>
              <td><strong style={{color:'#035C67',fontFamily:'monospace'}}>{id}</strong></td>
              <td>
                {editId === id ? (
                  <span className="inline-edit">
                    <input className="inline-input" value={editLabel} autoFocus
                      onChange={e => setEditLabel(e.target.value)}
                      onKeyDown={e => { if(e.key==='Enter') handleSaveEdit(id); if(e.key==='Escape') setEditId(null); }}
                      style={{width:180}} />
                    <button className="btn-primary" style={{padding:'3px 10px',fontSize:'11px'}} onClick={() => handleSaveEdit(id)}>Save</button>
                    <button className="icon-btn" onClick={() => setEditId(null)}>✕</button>
                  </span>
                ) : trc.label}
              </td>
              <td>
                <span className={`badge ${trc.active ? 'badge-active' : 'badge-inactive'}`}>
                  {trc.active ? 'Active' : 'Inactive'}
                </span>
              </td>
              <td style={{color:'#5A8A86',fontSize:'11px'}}>
                {totalQueues} templates × <strong>{Object.keys(trcs).length}</strong> TRCs
              </td>
              <td>
                <span style={{display:'flex',gap:'4px'}}>
                  <button className="icon-btn" onClick={() => { setEditId(id); setEditLabel(trc.label); }}>Edit</button>
                  <button className="icon-btn" onClick={() => handleToggle(id)}>{trc.active ? 'Disable' : 'Enable'}</button>
                  <button className="icon-btn danger" onClick={() => handleDelete(id)}>Delete</button>
                </span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
      {showAdd && (
        <div className="add-row">
          <span className="add-row-label">New TRC:</span>
          <input className="inline-input" placeholder="ID (e.g. MED)" style={{width:80}}
            value={newId} onChange={e => setNewId(e.target.value.toUpperCase())} maxLength={6}
            onKeyDown={e => e.key==='Enter' && handleAdd()} />
          <input className="inline-input" placeholder="Label (e.g. Medical)" style={{width:200}}
            value={newLabel} onChange={e => setNewLabel(e.target.value)}
            onKeyDown={e => e.key==='Enter' && handleAdd()} />
          <button className="btn-primary" disabled={!newId.trim()||!newLabel.trim()} onClick={handleAdd}>Add TRC</button>
          <button className="btn-secondary" onClick={() => { setShowAdd(false); setNewId(''); setNewLabel(''); }}>Cancel</button>
        </div>
      )}
    </div>
  );
}

// ─── QUEUE BUILDER ────────────────────────────────────────────────────────────
function QueueBuilder({ config, setConfig }) {
  const [openWS, setOpenWS]           = useState(Object.keys(config.workstreams)[0] || '');
  const [editQId, setEditQId]         = useState(null);
  const [editQData, setEditQData]     = useState({});
  const [newLabel, setNewLabel]       = useState('');
  const [newPriority, setNewPriority] = useState(2);
  const [newChannel, setNewChannel]   = useState('Offline');

  const totalQueues = Object.values(config.queueTemplates).reduce((n, qt) => n + qt.length, 0);
  const trcCount    = Object.keys(config.trcs).length;

  const handleAddQueue = (wsId) => {
    if (!newLabel.trim()) return;
    const safeLabel = newLabel.trim().replace(/\s+/g, '_');
    const id = `${wsId.slice(0,4)}_${safeLabel}`;
    setConfig(prev => ({
      ...prev,
      queueTemplates: {
        ...prev.queueTemplates,
        [wsId]: [...(prev.queueTemplates[wsId] || []), { id, label: newLabel.trim(), priority: newPriority, channel: newChannel }],
      },
    }));
    setNewLabel(''); setNewPriority(2); setNewChannel('Offline');
  };

  const handleDeleteQueue = (wsId, queueId) => {
    setConfig(prev => ({
      ...prev,
      queueTemplates: {
        ...prev.queueTemplates,
        [wsId]: prev.queueTemplates[wsId].filter(q => q.id !== queueId),
      },
    }));
  };

  const handleSaveQueue = (wsId, queueId) => {
    setConfig(prev => ({
      ...prev,
      queueTemplates: {
        ...prev.queueTemplates,
        [wsId]: prev.queueTemplates[wsId].map(q => q.id === queueId ? { ...q, ...editQData } : q),
      },
    }));
    setEditQId(null); setEditQData({});
  };

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">Queue Templates</span>
        <span className="config-section-sub">
          {totalQueues} templates × {trcCount} TRCs = <strong style={{color:'#035C67'}}>{totalQueues * trcCount}</strong> active queues
        </span>
      </div>
      {Object.entries(config.workstreams).map(([wsId, ws]) => {
        const queues = config.queueTemplates[wsId] || [];
        const isOpen = openWS === wsId;
        return (
          <div key={wsId} style={{borderBottom:'1px solid #F0F0F0'}}>
            <div
              className={`queue-ws-header ${isOpen ? 'open' : ''}`}
              onClick={() => setOpenWS(isOpen ? null : wsId)}>
              <span>
                <span className="queue-ws-name">{wsId}</span>
                <span className="queue-ws-meta">— {ws.complianceLevel}</span>
              </span>
              <span className="queue-ws-count">
                {queues.length} template{queues.length!==1?'s':''} {isOpen ? '▲' : '▼'}
              </span>
            </div>
            {isOpen && (
              <div>
                {queues.length > 0 ? (
                  <table className="config-table">
                    <thead>
                      <tr>
                        <th>Template ID</th>
                        <th>Label</th>
                        <th style={{width:70}}>Priority</th>
                        <th style={{width:90}}>Channel</th>
                        <th style={{width:130}}>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {queues.map(q => (
                        <tr key={q.id}>
                          <td style={{fontFamily:'monospace',fontSize:'10.5px',color:'#5A8A86'}}>{q.id}</td>
                          <td>
                            {editQId === q.id ? (
                              <input className="inline-input" style={{width:180}}
                                value={editQData.label !== undefined ? editQData.label : q.label}
                                onChange={e => setEditQData(p => ({...p, label: e.target.value}))} />
                            ) : q.label}
                          </td>
                          <td>
                            {editQId === q.id ? (
                              <select className="inline-select"
                                value={editQData.priority !== undefined ? editQData.priority : q.priority}
                                onChange={e => setEditQData(p => ({...p, priority: parseInt(e.target.value)}))}>
                                {[1,2,3,4].map(p => <option key={p} value={p}>P{p}</option>)}
                              </select>
                            ) : (
                              <span style={{
                                display:'inline-block', padding:'2px 8px', borderRadius:'4px',
                                background: q.priority===1?'rgba(234,83,83,0.12)':q.priority===2?'rgba(255,193,7,0.15)':'#F0F0F0',
                                color: q.priority===1?'#B71C1C':q.priority===2?'#6D4C41':'#5A8A86',
                                fontWeight:700, fontSize:'11px'
                              }}>P{q.priority}</span>
                            )}
                          </td>
                          <td>
                            {editQId === q.id ? (
                              <select className="inline-select"
                                value={editQData.channel !== undefined ? editQData.channel : q.channel}
                                onChange={e => setEditQData(p => ({...p, channel: e.target.value}))}>
                                <option>Phone</option><option>Offline</option>
                              </select>
                            ) : (
                              <span className={`badge ${q.channel==='Phone'?'badge-phone':'badge-offline'}`}>{q.channel}</span>
                            )}
                          </td>
                          <td>
                            {editQId === q.id ? (
                              <span style={{display:'flex',gap:'4px'}}>
                                <button className="btn-primary" style={{padding:'3px 10px',fontSize:'11px'}}
                                  onClick={() => handleSaveQueue(wsId, q.id)}>Save</button>
                                <button className="icon-btn" onClick={() => setEditQId(null)}>✕</button>
                              </span>
                            ) : (
                              <span style={{display:'flex',gap:'4px'}}>
                                <button className="icon-btn"
                                  onClick={() => { setEditQId(q.id); setEditQData({}); }}>Edit</button>
                                <button className="icon-btn danger"
                                  onClick={() => handleDeleteQueue(wsId, q.id)}>Delete</button>

                  <input className="inline-input" placeholder="Label" style={{width:180}}
                    value={newLabel} onChange={e => setNewLabel(e.target.value)}
                    onKeyDown={e => e.key==='Enter' && handleAddQueue(wsId)} />
                  <select className="inline-select" value={newPriority}
                    onChange={e => setNewPriority(parseInt(e.target.value))}>
                    {[1,2,3,4].map(p => <option key={p} value={p}>Priority {p}</option>)}
                  </select>
                  <select className="inline-select" value={newChannel}
                    onChange={e => setNewChannel(e.target.value)}>
                    <option>Offline</option><option>Phone</option>
                  </select>
                  <button className="btn-primary" disabled={!newLabel.trim()}
                    onClick={() => handleAddQueue(wsId)}>Add</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── THRESHOLD CONTROLS ───────────────────────────────────────────────────────
function ThresholdControls({ config, setConfig }) {
  const update = (channel, field, val) => {
    const n = parseFloat(val);
    if (isNaN(n)) return;
    setConfig(prev => ({
      ...prev,
      thresholds: {
        ...prev.thresholds,
        [channel]: { ...prev.thresholds[channel], [field]: n },
      },
    }));
  };

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">Threshold Controls</span>
        <span className="config-section-sub">Applies channel-wide. Override per queue in Queue Builder.</span>
      </div>
      <div className="threshold-grid">
        {Object.entries(config.thresholds).map(([channel, t]) => (
          <div key={channel} className="threshold-card">
            <div className="threshold-card-title">
              <span className={`badge ${channel==='Phone' ? 'badge-phone' : 'badge-offline'}`}>{channel}</span>
              {channel} Thresholds
            </div>
            <div className="threshold-row">
              <div>
                <div className="threshold-label">Under Threshold</div>
                <div className="threshold-hint">Net staff ≤ this → ALERT</div>
              </div>
              <input className="threshold-input" type="number" step="0.5"
                value={t.under} onChange={e => update(channel, 'under', e.target.value)} />
            </div>
            <div className="threshold-row">
              <div>
                <div className="threshold-label">Escalate Threshold</div>
                <div className="threshold-hint">Net staff ≤ this → ESCALATE</div>
              </div>
              <input className="threshold-input" type="number" step="0.5"
                value={t.escalate} onChange={e => update(channel, 'escalate', e.target.value)} />
            </div>
            <div className="threshold-row">
              <div>
                <div className="threshold-label">Surplus Threshold</div>
                <div className="threshold-hint">Net staff ≥ this → SURPLUS</div>
              </div>
              <input className="threshold-input" type="number" step="0.5"
                value={t.surplus} onChange={e => update(channel, 'surplus', e.target.value)} />
            </div>
            <hr className="threshold-divider" />
            <div className="threshold-row">
              <div>
                <div className="threshold-label">
                  {channel === 'Phone' ? 'SL Target (%)' : 'TAT Target (hrs)'}
                </div>
                <div className="threshold-hint">
                  {channel === 'Phone' ? 'Speed of Answer % goal' : 'Turnaround time goal'}
                </div>
              </div>
              <input className="threshold-input" type="number"
                step={channel === 'Phone' ? 5 : 0.5}
                value={channel === 'Phone' ? (t.slTarget ?? 80) : (t.tatTarget ?? 4)}
                onChange={e => update(channel, channel==='Phone'?'slTarget':'tatTarget', e.target.value)} />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── HEADCOUNT GRID ───────────────────────────────────────────────────────────
function HeadcountGrid({ config, setConfig }) {
  const trcs = Object.keys(config.trcs);
  const wss  = Object.keys(config.workstreams);

  const total = trcs.reduce((sum, trc) =>
    sum + wss.reduce((s2, ws) => s2 + (config.headcount[trc]?.[ws] || 0), 0), 0
  );

  const update = (trc, ws, val) => {
    const n = Math.max(0, parseInt(val) || 0);
    setConfig(prev => ({
      ...prev,
      headcount: {
        ...prev.headcount,
        [trc]: { ...prev.headcount[trc], [ws]: n },
      },
    }));
  };

  return (
    <div className="config-section">
      <div className="config-section-header">
        <span className="config-section-title">Headcount Grid</span>
        <span className="config-section-sub">
          Total: <strong style={{color:'#035C67'}}>{total}</strong> agents across all TRCs
        </span>
      </div>
      <div className="headcount-wrap">
        <table className="headcount-table">
          <thead>
            <tr>
              <th>TRC</th>
              {wss.map(ws => <th key={ws}>{ws}</th>)}
              <th>Row Total</th>
            </tr>
          </thead>
          <tbody>
            {trcs.map(trc => {
              const rowTotal = wss.reduce((s, ws) => s + (config.headcount[trc]?.[ws] || 0), 0);
              return (
                <tr key={trc}>
                  <td className="trc-cell">
                    <strong>{trc}</strong>
                    <span style={{fontWeight:400,color:'#5A8A86',marginLeft:6,fontSize:'11px'}}>
                      {config.trcs[trc]?.label}
                    </span>
                  </td>
                  {wss.map(ws => (
                    <td key={ws}>
                      <input className="headcount-input" type="number" min="0" max="99"
                        value={config.headcount[trc]?.[ws] || 0}
                        onChange={e => update(trc, ws, e.target.value)} />
                    </td>
                  ))}
                  <td className="total-cell">{rowTotal}</td>
                </tr>
              );
            })}
            <tr>
              <td className="trc-cell" style={{fontWeight:700,color:'#002F32'}}>Col Total</td>
              {wss.map(ws => (
                <td key={ws} className="total-cell">
                  {trcs.reduce((s, trc) => s + (config.headcount[trc]?.[ws] || 0), 0)}
                </td>
              ))}
              <td className="total-cell" style={{fontSize:'14px'}}><strong>{total}</strong></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── CONFIG TAB (container) ───────────────────────────────────────────────────
function ConfigTab({ config, setConfig }) {
  const [subTab, setSubTab] = useState('trcs');

  const queueCount = Object.values(config.queueTemplates).reduce((n, qt) => n + qt.length, 0)
                   * Object.keys(config.trcs).length;
  const agentCount = Object.values(config.headcount).reduce(
    (sum, hc) => sum + Object.values(hc).reduce((s, n) => s + n, 0), 0
  );

  const subTabs = [
    { id: 'trcs',        label: '⚙ TRCs'             },

  return (

      {/* Summary bar */}

        <div className="summary-stat"><strong>{Object.keys(config.trcs).length}</strong> TRCs</div>
        <div className="summary-stat"><strong>{Object.keys(config.workstreams).length}</strong> Workstreams</div>
        <div className="summary-stat"><strong>{Object.values(config.queueTemplates).reduce((n,qt) => n+qt.length, 0)}</strong> Templates</div>
        <div className="summary-stat"><strong>{queueCount}</strong> Active Queues</div>
        <div className="summary-stat"><strong>{agentCount}</strong> Agents</div>
      </div>
      {/* Sub-tabs */}

        {subTabs.map(t => (
          <button key={t.id} className={`config-subtab ${subTab===t.id?'active':''}`}
            onClick={() => setSubTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>
      {/* Content */}
      <div className="config-content">
        {subTab === 'trcs'        && <TRCBuilder config={config} setConfig={setConfig} />}
        {subTab === 'workstreams' && <WorkstreamBuilder config={config} setConfig={setConfig} />}

        </div>

          <div style={{padding:'10px 0', fontSize:11, color:'#5A8A86', marginBottom:6}}>
            Skills for <strong style={{color:'#035C67'}}>{emp.name}</strong> — {emp.role} · {emp.trc} / {emp.workstream} · {emp.seniorityYears.toFixed(1)} yrs seniority

                <th>Proficiency</th><th>Cert Date</th><th>Compliance</th>

                <tr key={i}>
                  <td style={{fontFamily:'Courier New', fontSize:10.5}}>{r.queueId}</td>
                  <td style={{fontSize:11}}>{r.queueLabel}</td>
                  <td><span className="badge badge-mint" style={{fontSize:9.5}}>{r.trc}</span></td>
                  <td style={{fontSize:11}}>{r.ws}</td>

// ─────────────────────────────────────────────────────────────────────────────
// DEMAND-FIRST STAFFING PLANNER
// Sizes headcount to BASELINE so scheduled ≈ required at peak.
// Scenarios (CO / VTO / volume) then apply pressure on top.
// Returns { [trc]: { [ws]: agentCount } }
// ─────────────────────────────────────────────────────────────────────────────
function computeRequiredHeadcount(config) {
  const base      = SCENARIOS.Baseline;              // always size to baseline
  const peakCurve = Math.max(...TIME_CURVE);         // 1.40
  const headcount = {};
  Object.entries(config.trcs).filter(([,t])=>t.active).forEach(([trc])=>{
    headcount[trc] = {};
    Object.entries(config.workstreams).filter(([,w])=>w.active).forEach(([ws])=>{
      const queues = config.queueTemplates[ws]||[];
      const qCount = queues.length||1;
      const wsBase = WS_BASE[ws]||{baseVol:8,baseAHT:360};
      // Each queue handles the full workstream volume independently (not shared).
      // Peak FTE per queue = peakVol × AHT / 1800  (Erlang-C, no occupancy divisor)
      const peakReqPerQueue = wsBase.baseVol * peakCurve * wsBase.baseAHT / 1800;
      // Baseline utilization: agents actually answering = (1 − CO − VTO) × adherence
      const baselineUtil = Math.max(0.4, (1 - base.calloutRate - base.vtoRate) * base.adherenceBase);
      // ×1.05 thin buffer → baseline is slight surplus so scenarios can push into deficit
      const perQueue = Math.max(1, Math.ceil(peakReqPerQueue * 1.05 / baselineUtil));
      headcount[trc][ws] = perQueue * qCount;
    });
  });
  return headcount;
}

// MODULE 3 — DATA TAB (full — Build Pass 3)
// ═════════════════════════════════════════════════════════════════════════════
function DataTab({ config, generatedData, setGeneratedData, setEmployees, setSkills, setSchedules, demoTrigger, onAfterGenerate }) {
  const [scenario,    setScenario]    = useState('Baseline');
  const [driverEvent, setDriverEvent] = useState('None');
  const [custom, setCustom] = useState({ volumeModifier:1.00, adherenceBase:0.92, calloutRate:0.04, vtoRate:0.02 });
  const [generating, setGenerating]   = useState(false);
  const [view,        setView]        = useState('picker'); // 'picker' | 'preview'
  const lastDemoTrigger = useRef(null);

  const activeTRCCount = Object.values(config.trcs).filter(t=>t.active).length;
  const queueCount     = Object.values(config.queueTemplates).reduce((n,qt)=>n+qt.length,0)*activeTRCCount;
  const allReady    = activeTRCCount>0 && queueCount>0; // employees auto-generated — no pre-req
  const isGenerated = !!(generatedData?.intervals?.length);

  const getParams = () => {
    const base   = scenario==='Custom' ? {...custom} : {...SCENARIOS[scenario]};
    const driver = DRIVER_EVENTS.find(d=>d.type===driverEvent)||DRIVER_EVENTS[0];
    return {
      ...base,
      volumeModifier: Math.max(0.4, Math.min(1.6, base.volumeModifier+driver.volumeImpact)),
      adherenceBase:  Math.max(0.72, Math.min(1.0, base.adherenceBase+driver.adherenceImpact)),
      label: scenario+(driver.type!=='None'?` / ${driver.label}`:''),
    };
  };

  // Projected headcount — always baseline-sized; scenarios drive pressure not headcount
  const projectedHeadcount = useMemo(()=>{
    if(!allReady) return null;
    return computeRequiredHeadcount(config);
  },[config]);

  const projectedTotal = useMemo(()=>{
    if(!projectedHeadcount) return 0;
    return Object.values(projectedHeadcount).reduce((s,ws)=>s+Object.values(ws).reduce((a,b)=>a+b,0),0);
  },[projectedHeadcount]);

  const handleGenerate = useCallback((overrides={}) => {
    if(!allReady||generating) return;
    const effectiveScenario    = overrides.scenario    || scenario;
    const effectiveDriverEvent = overrides.driverEvent || driverEvent;
    if(overrides.scenario)    setScenario(overrides.scenario);
    if(overrides.driverEvent) setDriverEvent(overrides.driverEvent);
    setGenerating(true);
    setTimeout(()=>{
      try {
        const base   = effectiveScenario==='Custom' ? {...custom} : {...SCENARIOS[effectiveScenario]};
        const driver = DRIVER_EVENTS.find(d=>d.type===effectiveDriverEvent)||DRIVER_EVENTS[0];
        const params = {
          ...base,
          volumeModifier: Math.max(0.4, Math.min(1.6, base.volumeModifier+driver.volumeImpact)),
          adherenceBase:  Math.max(0.72, Math.min(1.0, base.adherenceBase+driver.adherenceImpact)),
          label: effectiveScenario+(driver.type!=='None'?` / ${driver.label}`:''),
        };
        const startDate = (()=>{ const d=new Date(); const dow=d.getDay(); d.setDate(d.getDate()-(dow===0?6:dow-1)); d.setHours(0,0,0,0); return d; })();
        const ql = buildQueueList(config);
        const autoHC = computeRequiredHeadcount(config);
        const emps   = generateEmployees({...config, headcount: autoHC});
        const skls   = generateSkills(emps, config);
        const scheds = generateSchedules(emps, skls);
        const as = generateAgentSchedules(emps, scheds, params, startDate, 14);
        const iv = generateIntervals(as, ql, params, startDate, 14);
        const rw = generateRiskWindows(iv);
        const dh = generateDailyHistory(ql, params, startDate, 13);
        const wh = aggregateWeeklyHistory(dh);
        const wf = generateWeeklyForecast(wh, params);
        const ta = generateTRCAggregates(iv, config);
        const ss = calculateScheduleScore(as, ql);
        setEmployees(emps); setSkills(skls); setSchedules(scheds);
        const result = { scenario:effectiveScenario, driverEvent:effectiveDriverEvent, scenarioParams:params,
          queueList:ql, agentSchedules:as, intervals:iv,
          riskWindows:rw, dailyHistory:dh, weeklyHistory:wh,
          weeklyForecast:wf, trcAggregates:ta, scheduleScore:ss,
          autoHeadcount:autoHC, totalAgents:emps.length };
        setGeneratedData(result);
        setView('preview');
        if(onAfterGenerate) onAfterGenerate(result);
      } catch(e){ console.error('Generate error:', e); }
      setGenerating(false);
    },50);
  },[allReady, generating, scenario, driverEvent, custom, config, setEmployees, setSkills, setSchedules, setGeneratedData, onAfterGenerate]);

  // Demo auto-generate: fire when demoTrigger changes
  useEffect(()=>{
    if(demoTrigger && demoTrigger !== lastDemoTrigger.current && !generating) {
      lastDemoTrigger.current = demoTrigger;
      handleGenerate(demoTrigger);
    }
  },[demoTrigger, generating, handleGenerate]);

  const scenarioMeta = [
    { id:'Baseline',      icon:'📊', color:'#035C67', desc:'Normal weekday — balanced demand & staffing' },
    { id:'HighVolume',    icon:'📈', color:'#EA5353', desc:'+25% volume, low VTO — push staffing limits' },
    { id:'Understaffed',  icon:'⚠️',  color:'#E88789', desc:'10% callout rate — short-staff stress test' },
    { id:'Surplus',       icon:'💚', color:'#1B5E20', desc:'-15% vol, +8% VTO — manage overstaffed day' },
    { id:'MixedPressure', icon:'🔀', color:'#8B6914', desc:'+10% vol + 6% callouts — realistic pressure' },
    { id:'Custom',        icon:'⚙',  color:'#008F83', desc:'Set your own vol / adherence / callout params' },
  ];

  const checks = [
    { label:'TRCs active',     done:activeTRCCount>0, detail:`${activeTRCCount} active` },
    { label:'Queue templates', done:queueCount>0,     detail:`${queueCount} queues`     },
  ];

  return (

function IntradayView({ activeTRC, generatedData }) {
  // Always anchor to the CURRENT or UPCOMING business week.
  // If today is a weekday → Monday of this week; if weekend → next Monday.
  // defaultDay = today when it's a weekday, else next Monday.
  const [weekDays, defaultDay] = useMemo(()=>{
    const now=new Date(); const dow=now.getDay(); // 0=Sun…6=Sat
    const mon=new Date(now);
    if(dow===0)      mon.setDate(now.getDate()+1);        // Sun → next Mon
    else if(dow===6) mon.setDate(now.getDate()+2);        // Sat → next Mon
    else             mon.setDate(now.getDate()-(dow-1));  // weekday → Mon of this week
    mon.setHours(0,0,0,0);
    const days=[0,1,2,3,4].map(i=>{
      const d=new Date(mon); d.setDate(mon.getDate()+i);
      return { date:d.toISOString().split('T')[0],
               label:['Mon','Tue','Wed','Thu','Fri'][i],
               short:`${d.getMonth()+1}/${d.getDate()}` };
    });
    // Default selection: today if weekday, else Monday
    const def=(dow>=1&&dow<=5) ? now.toISOString().split('T')[0] : days[0].date;
    return [days, def];
  },[]);

  const [viewDay,    setViewDay]    = useState(defaultDay);
  const [selectedWS, setSelectedWS] = useState('ALL');
  const [selectedQ,  setSelectedQ]  = useState('ALL');

  // Reset filters when day or TRC changes
  useEffect(()=>{ setSelectedWS('ALL'); setSelectedQ('ALL'); },[viewDay,activeTRC]);

  // WS short labels
  const wsShort = {Pharmacist:'Pharm',Technician:'Tech',PatientAccess:'PtAcc',ContactCenter:'CC'};

  // All viewDay's intervals for this TRC
  const todayIntervals = useMemo(()=>{
    if(!generatedData?.intervals) return [];
    return generatedData.intervals.filter(iv=>iv.date===viewDay&&(activeTRC==='ALL'||iv.trc===activeTRC));
  },[generatedData,viewDay,activeTRC]);

  // Cascade resets: TRC change → reset WS + Q; WS change → reset Q
  useEffect(()=>{ setSelectedWS('ALL'); setSelectedQ('ALL'); },[activeTRC]);
  useEffect(()=>setSelectedQ('ALL'),[selectedWS]);

  // Available workstreams from this TRC's intervals
  const wsList = useMemo(()=>[
    'ALL',
    ...[...new Set(todayIntervals.map(iv=>iv.workstream))].sort()
  ],[todayIntervals]);

  // Intervals scoped to selected WS
  const wsIntervals = useMemo(()=>
    selectedWS==='ALL' ? todayIntervals : todayIntervals.filter(iv=>iv.workstream===selectedWS)
  ,[todayIntervals,selectedWS]);

  // Queue list scoped to selected WS
  const queueList = useMemo(()=>[
    'ALL',
    ...wsIntervals.map(iv=>iv.queueId).sort()
  ],[wsIntervals]);

  // Risk windows: TRC + WS + Q filtered
  const todayRisks = useMemo(()=>{
    if(!generatedData?.riskWindows) return [];
    let rw = generatedData.riskWindows.filter(w=>w.date===viewDay&&(activeTRC==='ALL'||w.trc===activeTRC));
    if(selectedWS!=='ALL') rw = rw.filter(w=>w.workstream===selectedWS);
    if(selectedQ!=='ALL')  rw = rw.filter(w=>w.queueId===selectedQ);
    return (selectedQ==='ALL'&&selectedWS==='ALL') ? rw.slice(0,8) : rw;
  },[generatedData,viewDay,activeTRC,selectedWS,selectedQ]);

  // Aggregate slot map from wsIntervals
  const slotMap = useMemo(()=>{
    const m={};
    wsIntervals.forEach(iv=>(iv.slots||[]).forEach(s=>{
      if(!m[s.time]) m[s.time]={sch:0,act:0,req:0,net:0};
      m[s.time].sch+=s.scheduledFTE||0;
      m[s.time].act+=s.actualFTE||0;
      m[s.time].req+=s.requiredFTE||0;
      m[s.time].net+=s.netStaffing||0;
    }));
    return Object.entries(m).sort(([a],[b])=>a.localeCompare(b));
  },[wsIntervals]);

  // Per-queue slot detail
  const queueSlots = useMemo(()=>{
    if(selectedQ==='ALL') return null;
    return wsIntervals.find(iv=>iv.queueId===selectedQ)?.slots||[];
  },[wsIntervals,selectedQ]);

  // Queue summary (worst net first), scoped to selected WS
  const queueSummary = useMemo(()=>
    wsIntervals.map(iv=>{
      const slots=iv.slots||[];
      const nets=slots.map(s=>s.netStaffing||0);
      const n=nets.length||1;
      const netAvg=parseFloat((nets.reduce((a,b)=>a+b,0)/n).toFixed(1));
      const worst=nets.length>0?Math.min(...nets):0;
      const riskSlots=slots.filter(s=>s.status==='at_risk'||s.status==='critical').length;
      const critSlots=slots.filter(s=>s.status==='critical').length;
      return {queueId:iv.queueId,workstream:iv.workstream,trc:iv.trc,netAvg,worst,riskSlots,critSlots};
    }).sort((a,b)=>a.netAvg-b.netAvg)
  ,[wsIntervals]);

  // Active agents scoped to TRC + WS + viewDay
  const agentsActive = useMemo(()=>{
    if(!generatedData?.agentSchedules) return 0;
    let as = generatedData.agentSchedules.filter(a=>a.date===viewDay&&a.status==='Active'&&(activeTRC==='ALL'||a.trc===activeTRC));
    if(selectedWS!=='ALL') as = as.filter(a=>a.workstream===selectedWS);
    return as.length;
  },[generatedData,viewDay,activeTRC,selectedWS]);

  const score    = generatedData?.scheduleScore;
  const avgNet   = slotMap.length>0 ? Math.round(slotMap.reduce((s,[,v])=>s+v.net,0)/slotMap.length) : 0;
  const netColor = avgNet<-2?'#EA5353':avgNet<0?'#E88789':avgNet>3?'#90B9FF':'#008F83';
  const netCls   = n=>n<-2?'net-bad':n<0?'net-warn':n>0?'net-ok':'';
  const scopeLabel = selectedQ!=='ALL' ? selectedQ : selectedWS!=='ALL' ? (wsShort[selectedWS]||selectedWS) : 'ALL';

  return (
    <div className="bp4-view">
      {/* Day selector — Mon–Fri of current work week */}
      <div style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',background:'#F0FAF8',borderBottom:'1px solid #D8E8E6',flexWrap:'wrap'}}>
        <span style={{fontSize:10,fontWeight:700,color:'#5A8A86',textTransform:'uppercase',letterSpacing:'0.5px',marginRight:4}}>Day</span>
        {weekDays.map(wd=>{
          const isActive=wd.date===viewDay;
          const hasData=generatedData?.intervals?.some(iv=>iv.date===wd.date&&(activeTRC==='ALL'||iv.trc===activeTRC));
          return (
            <button key={wd.date} onClick={()=>setViewDay(wd.date)}
              style={{padding:'3px 10px',borderRadius:12,border:isActive?'1.5px solid #035C67':'1px solid #C8E0DC',
                background:isActive?'#035C67':'#fff',color:isActive?'#3EFFC0':hasData?'#002F32':'#B0C8C6',
                fontWeight:isActive?700:500,fontSize:11,cursor:'pointer',lineHeight:1.3,whiteSpace:'nowrap'}}>
              <div>{wd.label}</div>
              <div style={{fontSize:9,opacity:0.85}}>{wd.short}</div>
            </button>
          );
        })}
        <span style={{marginLeft:'auto',fontSize:10,color:'#5A8A86'}}>{viewDay}</span>
      </div>

      {/* KPI row — reflects current day + WS scope */}
      <div className="bp4-kpi-row">
        <KpiCard label="Active" value={agentsActive} color="#035C67" />
        <KpiCard label="Risks" value={todayRisks.length} color={todayRisks.length>3?'#EA5353':'#008F83'} sub={viewDay} />
        <KpiCard label="Score" value={score?`${score.score}${score.grade}`:'—'} color={score&&'AB'.includes(score.grade)?'#008F83':'#EA5353'} />
        <KpiCard label="Avg Net" value={avgNet>=0?`+${avgNet}`:avgNet} color={netColor} />
      </div>

      {/* Net staffing sparkline chart — shows staffing health across the day */}
      {slotMap.length>0&&(
        <div className="net-sparkline" title="Net staffing by 30-min slot — green=surplus, red=understaffed">
          <div className="net-sparkline-inner">
            <div className="net-sparkline-zero"/>
            {slotMap.map(([time,v],i)=>{
              const MAX_NET=5;
              const net=Math.max(-MAX_NET,Math.min(MAX_NET,v.net));
              const halfH=27; // px — half the 54px inner height
              const barH=Math.max(2,Math.abs(net)/MAX_NET*halfH);
              const isPos=net>=0;
              const color=net<-3?'#EA5353':net<0?'#E88789':net<1?'#C8E0DC':net<3?'#3EFFC0':'#00CFAB';
              const showLabel = i===0||i===slotMap.length-1||(i%4===0);
              return (
                <div key={time} className="net-spark-col"
                  style={{justifyContent:isPos?'flex-end':'flex-start',paddingTop:isPos?0:halfH,paddingBottom:isPos?halfH:0}}
                  title={`${time}: Net ${v.net>=0?'+':''}${Math.round(v.net*10)/10}`}>
                  {isPos
                    ? <div className="net-spark-bar-pos" style={{height:barH,background:color}}/>
                    : <div className="net-spark-bar-neg" style={{height:barH,background:color}}/>
                  }
                  {showLabel&&<span className="net-spark-label">{time.slice(0,5)}</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Queue health strip — one pill per queue, colored by worst net status for viewDay */}
      {queueSummary.length>0&&(
        <div className="queue-health-strip" title="Click a queue to drill in">
          {queueSummary.map((q,i)=>{
            const color=q.critSlots>0?'#EA5353':q.riskSlots>0?'#E88789':q.netAvg>2?'#3EFFC0':'#7CCCBE';
            const bg=q.critSlots>0?'rgba(234,83,83,0.1)':q.riskSlots>0?'rgba(232,135,137,0.1)':'rgba(62,255,192,0.1)';
            const isSelected=selectedQ===q.queueId;
            return (
              <span key={i} className="q-health-pill"
                style={{background:isSelected?color:bg,color:isSelected?'#002F32':color,
                  borderColor:color,cursor:'pointer',
                  boxShadow:isSelected?`0 0 0 2px ${color}40`:undefined}}
                onClick={()=>{ setSelectedWS(q.workstream); setSelectedQ(isSelected?'ALL':q.queueId); }}
                title={`${q.queueId} · Net avg: ${q.netAvg>=0?'+':''}${q.netAvg} · ⚠ ${q.riskSlots} slots · ❗ ${q.critSlots} critical`}>
                {q.queueId.split('-').slice(-1)[0]}
                {q.critSlots>0&&' ❗'}
                {q.critSlots===0&&q.riskSlots>0&&' ⚠'}
              </span>
            );
          })}
        </div>
      )}

      {/* Workstream selector */}
      <div className="bp4-ws-selector">
        <span className="bp4-ws-label">WS</span>
        {wsList.map(ws=>(
          <button key={ws} className={`bp4-ws-pill ${selectedWS===ws?'active':''}`}
            onClick={()=>setSelectedWS(ws)}>
            {ws==='ALL'?'ALL':(wsShort[ws]||ws)}
          </button>
        ))}
      </div>

      {/* Queue selector — scoped to selected WS */}
      <div className="bp4-q-selector">
        {queueList.map(q=>(
          <button key={q} className={`bp4-q-pill ${selectedQ===q?'active':''}`}
            onClick={()=>setSelectedQ(q)}>
            {q==='ALL'?'ALL':q.split('-').slice(-1)[0]}
          </button>
        ))}
      </div>

      {/* ALL-queue view: aggregate time table + queue summary */}
      {selectedQ==='ALL'&&(
        <>
          <div className="bp4-section-label">
            AGGREGATE — {selectedWS==='ALL'?'ALL WORKSTREAMS':(wsShort[selectedWS]||selectedWS)}
          </div>
          <div className="bp4-table-wrap" style={{maxHeight:150}}>
            <table className="bp4-table">
              <thead><tr><th>Time</th><th>Sch</th><th>Act</th><th>Req</th><th>Net</th></tr></thead>
              <tbody>
                {slotMap.map(([time,v])=>(
                  <tr key={time}>
                    <td className="time-col">{time}</td>
                    <td>{Math.round(v.sch*10)/10}</td>
                    <td>{Math.round(v.act*10)/10}</td>
                    <td>{Math.round(v.req*10)/10}</td>
                    <td className={netCls(v.net)}>{v.net>=0?'+':''}{Math.round(v.net)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="bp4-section-label">QUEUE SUMMARY ▲ WORST FIRST</div>
          <div className="bp4-table-wrap">
            <table className="bp4-table">
              <thead><tr><th>Queue</th><th>WS</th><th>Net Avg</th><th>Worst</th><th>⚠ Slots</th></tr></thead>
              <tbody>
                {queueSummary.map((q,i)=>(
                  <tr key={i} style={{cursor:'pointer'}} onClick={()=>{ setSelectedWS(q.workstream); setSelectedQ(q.queueId); }}
                    title={`Drill into ${q.queueId}`}>
                    <td style={{fontSize:9,fontFamily:'Courier New',textAlign:'left',color:'#035C67',fontWeight:700}}>{q.queueId}</td>
                    <td style={{fontSize:9}}>{wsShort[q.workstream]||q.workstream.slice(0,4)}</td>
                    <td className={netCls(q.netAvg)}>{q.netAvg>=0?'+':''}{q.netAvg}</td>
                    <td style={{fontFamily:'Courier New',fontSize:10,color:q.worst<-2?'#EA5353':'#E88789',fontWeight:700}}>{q.worst}</td>
                    <td style={{color:q.riskSlots>4?'#EA5353':q.riskSlots>0?'#E88789':'#008F83',fontWeight:q.riskSlots>0?700:400}}>
                      {q.riskSlots}{q.critSlots>0?` (${q.critSlots}❗)`:''}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Per-queue view: 24-slot detail with Vol + Adh% */}
      {selectedQ!=='ALL'&&queueSlots&&(
        <>
          <div className="bp4-section-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>QUEUE DETAIL — {selectedQ}</span>
            <span style={{fontSize:9,color:'#5A8A86',fontWeight:400,textTransform:'none',letterSpacing:0}}>
              {wsShort[wsIntervals.find(iv=>iv.queueId===selectedQ)?.workstream]||''}
            </span>
          </div>
          <div className="bp4-table-wrap" style={{maxHeight:240}}>
            <table className="bp4-table">
              <thead><tr><th>Time</th><th>Sch</th><th>Act</th><th>Req</th><th>Net</th><th>Vol</th><th>Adh%</th></tr></thead>
              <tbody>
                {queueSlots.map((s,i)=>(
                  <tr key={i}>
                    <td className="time-col">{s.time}</td>
                    <td>{s.scheduledFTE}</td>
                    <td>{s.actualFTE}</td>
                    <td>{s.requiredFTE}</td>
                    <td className={netCls(s.netStaffing)}>{s.netStaffing>=0?'+':''}{s.netStaffing}</td>
                    <td style={{color:'#5A8A86'}}>{s.volume}</td>
                    <td style={{color:s.adherencePct<0.88?'#EA5353':'#5A8A86',fontSize:9}}>
                      {s.adherencePct!=null?Math.round(s.adherencePct*100)+'%':'—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Risk windows — scope-aware label */}
      {todayRisks.length>0&&(
        <>
          <div className="bp4-section-label" style={{color:'#EA5353'}}>
            ⚠ RISK WINDOWS ({todayRisks.length}){scopeLabel!=='ALL'?` — ${scopeLabel}`:''}
          </div>
          <div className="bp4-risks">
            {todayRisks.map((w,i)=>(
              <div key={i} className="bp4-risk-row">
                <span className="bp4-risk-queue">{selectedQ==='ALL'?w.queueId:w.start}</span>
                <span className="bp4-risk-window">{selectedQ==='ALL'?`${w.start}–`:''}{w.end}</span>
                <span className="bp4-risk-net" style={{color:'#EA5353'}}>{w.netAvg}</span>
                <span className="bp4-risk-dur">{w.durationMins}m</span>
                <span style={{fontSize:9,color:w.timeBucket==='PEAK'?'#EA5353':'#90B9FF',flexShrink:0}}>{w.timeBucket}</span>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function ShortRangeView({ activeTRC, generatedData }) {
  const score = generatedData?.scheduleScore;
  const todayBase = useMemo(()=>new Date(),[]);
  const days = useMemo(()=>Array.from({length:7},(_,i)=>{
    const d=new Date(todayBase); d.setDate(d.getDate()+i-3);
    return d.toISOString().split('T')[0];
  }),[todayBase]);
  const todayStr = todayBase.toISOString().split('T')[0];
  const dailyStats = useMemo(()=>{
    if(!generatedData?.agentSchedules) return [];
    return days.map(date=>{
      const ds=generatedData.agentSchedules.filter(a=>a.date===date&&(activeTRC==='ALL'||a.trc===activeTRC));
      return {date, active:ds.filter(a=>a.status==='Active').length,
              callout:ds.filter(a=>a.status==='CallOut').length,
              vto:ds.filter(a=>a.status==='VTO').length, total:ds.length};
    });
  },[generatedData,days,activeTRC]);
  const weeklyHistory = useMemo(()=>{
    if(!generatedData?.weeklyHistory) return [];
    const byWk={};
    generatedData.weeklyHistory.filter(w=>activeTRC==='ALL'||w.trc===activeTRC).forEach(w=>{
      if(!byWk[w.week]) byWk[w.week]={week:w.week,vol:0,sl:0,cnt:0};
      byWk[w.week].vol+=w.actualVolume||0;
      byWk[w.week].sl+=w.sl||0;
      byWk[w.week].cnt++;
    });
    return Object.values(byWk).sort((a,b)=>a.week.localeCompare(b.week)).slice(-6);
  },[generatedData,activeTRC]);
  const gradeColor={A:'#008F83',B:'#5A8A86',C:'#E88789',D:'#EA5353',F:'#B71C1C'};
  return (
    <div className="bp4-view">
      {score&&(
        <div className="bp4-score-card">
          <div className="bp4-score-grade" style={{color:gradeColor[score.grade]||'#035C67'}}>{score.grade}</div>
          <div className="bp4-score-info">
            <div style={{fontWeight:700,fontSize:13,color:'#035C67'}}>{score.score}/100</div>
            <div style={{fontSize:10,color:'#5A8A86'}}>Schedule Score</div>
            {(score.penalties||[]).slice(0,2).map((p,i)=>(
              <div key={i} style={{fontSize:9.5,color:'#EA5353',marginTop:2}}>
                ⚠ {typeof p==='object'?`${p.type}: ${p.detail}`:p}
              </div>
            ))}
          </div>
        </div>
      )}
      {/* 7-day coverage bar chart — active agents per day */}
      {dailyStats.length>0&&(()=>{
        const maxActive=Math.max(...dailyStats.map(d=>d.active),1);
        return (
          <div className="mini-bar-chart">
            <div style={{fontSize:9,fontWeight:700,color:'#5A8A86',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:3}}>AGENT COVERAGE — 7 DAYS</div>
            {dailyStats.map((d,i)=>{
              const isToday=d.date===todayStr;
              const activePct=d.active/maxActive*100;
              const coPct=d.callout>0?d.callout/maxActive*100:0;
              const vtoPct=d.vto>0?d.vto/maxActive*100:0;
              return (
                <div key={i} className="mini-bar-row">
                  <span className="mini-bar-label" style={{color:isToday?'#035C67':'#5A8A86',fontWeight:isToday?700:400}}>
                    {d.date.slice(5)}{isToday?' ★':''}
                  </span>
                  <div className="mini-bar-track" title={`${d.date}: ${d.active} active · ${d.callout} CO · ${d.vto} VTO`}>
                    <div className="mini-bar-fill" style={{width:`${activePct}%`,background:isToday?'#3EFFC0':'#7CCCBE',borderRadius:2}}/>
                    {coPct>0&&<div style={{position:'absolute',left:`${activePct-coPct}%`,top:0,bottom:0,width:`${coPct}%`,background:'rgba(234,83,83,0.5)'}}/>}
                    {vtoPct>0&&<div style={{position:'absolute',left:`${activePct-coPct-vtoPct}%`,top:0,bottom:0,width:`${vtoPct}%`,background:'rgba(144,185,255,0.5)'}}/>}
                  </div>
                  <span className="mini-bar-value">{d.active}</span>
                  {d.callout>0&&<span style={{fontSize:8,color:'#EA5353',fontWeight:700,flexShrink:0}}>-{d.callout}CO</span>}
                  {d.vto>0&&<span style={{fontSize:8,color:'#90B9FF',fontWeight:700,flexShrink:0}}>-{d.vto}VTO</span>}
                </div>
              );
            })}
            <div style={{display:'flex',gap:10,marginTop:4,paddingTop:3,borderTop:'1px solid #E8F5F4'}}>
              <span style={{fontSize:8,color:'#5A8A86'}}><span style={{display:'inline-block',width:8,height:8,background:'#3EFFC0',borderRadius:1,marginRight:3,verticalAlign:'middle'}}/>Active</span>
              <span style={{fontSize:8,color:'#5A8A86'}}><span style={{display:'inline-block',width:8,height:8,background:'rgba(234,83,83,0.5)',borderRadius:1,marginRight:3,verticalAlign:'middle'}}/>CO</span>
              <span style={{fontSize:8,color:'#5A8A86'}}><span style={{display:'inline-block',width:8,height:8,background:'rgba(144,185,255,0.5)',borderRadius:1,marginRight:3,verticalAlign:'middle'}}/>VTO</span>
            </div>
          </div>
        );
      })()}
      <div className="bp4-section-label">7-DAY AGENT COVERAGE</div>
      <div className="bp4-table-wrap">
        <table className="bp4-table">
          <thead><tr><th>Date</th><th>Active</th><th>CO</th><th>VTO</th><th>Total</th></tr></thead>
          <tbody>
            {dailyStats.map((d,i)=>{
              const isToday=d.date===todayStr;
              return (
                <tr key={i} style={isToday?{background:'rgba(62,255,192,0.08)',fontWeight:700}:{}}>
                  <td className="time-col" style={{fontSize:9.5}}>{d.date.slice(5)}{isToday?' ★':''}</td>
                  <td>{d.active}</td>
                  <td style={{color:d.callout>0?'#EA5353':'inherit'}}>{d.callout}</td>
                  <td style={{color:d.vto>0?'#90B9FF':'inherit'}}>{d.vto}</td>
                  <td>{d.total}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {weeklyHistory.length>0&&(
        <>
          <div className="bp4-section-label">WEEKLY HISTORY (LAST 6)</div>
          <div className="bp4-table-wrap">
            <table className="bp4-table">
              <thead><tr><th>Week</th><th>Act Vol</th><th>SL%</th></tr></thead>
              <tbody>
                {weeklyHistory.map((w,i)=>(
                  <tr key={i}>
                    <td style={{fontSize:9,fontFamily:'Courier New',textAlign:'left'}}>{w.week.slice(5)}</td>
                    <td>{Math.round(w.vol)}</td>
                    <td>{w.cnt>0?Math.round(w.sl/w.cnt):'—'}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

function LongRangeView({ activeTRC, generatedData }) {
  const weeklyHistory = useMemo(()=>{
    if(!generatedData?.weeklyHistory) return [];
    const byWk={};
    generatedData.weeklyHistory.filter(w=>activeTRC==='ALL'||w.trc===activeTRC).forEach(w=>{
      if(!byWk[w.week]) byWk[w.week]={week:w.week,vol:0,sl:0,adh:0,cnt:0};
      byWk[w.week].vol+=w.actualVolume||0;
      byWk[w.week].sl+=w.sl||0;
      byWk[w.week].adh+=w.adherence||0;
      byWk[w.week].cnt++;
    });
    return Object.values(byWk).sort((a,b)=>a.week.localeCompare(b.week));
  },[generatedData,activeTRC]);
  const weeklyForecast = useMemo(()=>{
    if(!generatedData?.weeklyForecast) return [];
    const byWk={};
    generatedData.weeklyForecast.filter(w=>activeTRC==='ALL'||w.trc===activeTRC).forEach(w=>{

// STEP 12 — FLOW GRAPH ENGINE
// ═════════════════════════════════════════════════════════════════════════════
const WS_AHT = { Pharmacist:600, Technician:480, PatientAccess:420, ContactCenter:300 };

function getQueueSimData(queueId, activeTRC, effectiveData) {
  const data = effectiveData || {};
  const intervals = (data.intervals||[]).filter(iv =>
    iv.queueId === queueId && (activeTRC==='ALL' || iv.trc===activeTRC)
  );
  if (!intervals.length) return { avgFTE:0, throughput:0, netAvg:0, workstream:'Technician' };
  const workstream = intervals[0].workstream || 'Technician';
  const aht = WS_AHT[workstream] || 480;
  const contactsPerFTEHr = 3600 / aht;
  let totalFTE=0, totalNet=0, count=0;
  intervals.forEach(iv => {
    // Peak slots: slotIdx 6–14 = 10 am–2 pm (30 min slots from 7 am)
    const slots = (iv.slots||[]).filter(s=>s.slotIdx>=6 && s.slotIdx<=14);
    slots.forEach(s => { totalFTE+=(s.actualFTE||0); totalNet+=(s.netStaffing||0); count++; });
  });
  const avgFTE = count ? totalFTE/count : 0;
  const netAvg = count ? totalNet/count : 0;
  return {
    avgFTE: Math.round(avgFTE*10)/10,
    throughput: Math.round(avgFTE*contactsPerFTEHr),
    netAvg: Math.round(netAvg*10)/10,
    workstream,
  };
}

function simulateFlowGraph(flowDef, incomingVol, activeTRC, effectiveData) {
  if (!flowDef?.steps?.length) return [];
  let vol = incomingVol;
  return flowDef.steps.map((step, i) => {
    const sim = getQueueSimData(step.queueId, activeTRC, effectiveData);
    const volIn      = Math.round(vol);
    const throughput = sim.throughput || 0;
    const processed  = Math.min(volIn, throughput);
    const backlog    = Math.max(0, volIn - throughput);
    const utilPct    = throughput>0 ? Math.round((volIn/throughput)*100) : 0;
    const status     = backlog>0 ? 'bottleneck' : utilPct>90 ? 'near-cap' : 'ok';
    const isLast     = i===flowDef.steps.length-1;
    const volOut     = isLast ? 0 : Math.round(processed * step.passThrough);
    vol = volOut;
    return { ...step, ...sim, volIn, throughput, processed, backlog, utilPct, volOut, status };
  });
}

function buildTRCCompareData(effectiveData) {
  const data = effectiveData || {};
  const intervals = data.intervals || [];
  const trcs = [...new Set(intervals.map(iv=>iv.trc))].sort();
  // use first date present
  const dates = [...new Set(intervals.map(iv=>iv.date))].sort();
  const refDate = dates[0] || '';
  const grid = {};
  intervals.filter(iv=>!refDate||iv.date===refDate).forEach(iv=>{
    const ws  = iv.workstream || 'Unknown';
    const qid = iv.queueId;
    if (!grid[ws]) grid[ws]={};
    if (!grid[ws][qid]) grid[ws][qid]={ label: iv.queueLabel||qid, trcs:{} };
    const peakSlots = (iv.slots||[]).filter(s=>s.slotIdx>=6&&s.slotIdx<=14);
    const avgNet = peakSlots.length
      ? peakSlots.reduce((s,sl)=>s+(sl.netStaffing||0),0)/peakSlots.length : 0;
    grid[ws][qid].trcs[iv.trc] = Math.round(avgNet*10)/10;
  });
  // loan recommendations
  const loans=[];
  Object.entries(grid).forEach(([ws,queues])=>{
    Object.entries(queues).forEach(([qid,qData])=>{
      const surplus = Object.entries(qData.trcs).filter(([,v])=>v>=2).map(([t,v])=>({trc:t,net:v}));
      const deficit = Object.entries(qData.trcs).filter(([,v])=>v<=-1).map(([t,v])=>({trc:t,net:v}));
      if (surplus.length&&deficit.length) {
        const best = surplus.sort((a,b)=>b.net-a.net)[0];
        deficit.forEach(d=>{
          loans.push({ from:best.trc, to:d.trc, queue:qData.label, workstream:ws,
            loanAmt:Math.round(Math.min(Math.abs(d.net),best.net)),
            defNet:d.net, surNet:best.net });
        });
      }
    });
  });
  return { grid, trcs, loans:loans.slice(0,8) };
}
